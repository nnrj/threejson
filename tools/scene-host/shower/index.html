<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ThreeJSON Shower</title>
  <link rel="icon" href="../../../assets/img/threejson.ico" type="image/x-icon">
  <script type="importmap">
    {
      "imports": {
        "threejson": "../../../builtins/full.js",
        "threejson/core": "../../../core/index.js",
        "three": "https://esm.sh/three@0.184.0",
        "three/examples/jsm/": "https://esm.sh/three@0.184.0/examples/jsm/",
        "@tweenjs/tween.js": "https://esm.sh/@tweenjs/tween.js@25.0.0",
        "fflate": "https://esm.sh/fflate@0.8.3",
        "html2canvas-pro": "https://esm.sh/html2canvas-pro@2.0.4",
        "gifuct-js": "https://esm.sh/gifuct-js@2.1.2",
        "three-mesh-bvh": "https://esm.sh/three-mesh-bvh@0.9.10?deps=three@0.184.0",
        "three-bvh-csg": "https://esm.sh/three-bvh-csg@0.0.18?deps=three@0.184.0,three-mesh-bvh@0.9.10",
        "troika-three-text": "https://esm.sh/troika-three-text@0.52.4?deps=three@0.184.0",
        "echarts": "https://esm.sh/echarts@5.6.0",
        "@dimforge/rapier3d-compat": "https://esm.sh/@dimforge/rapier3d-compat@0.19.3"
      }
    }
  </script>
  <link rel="stylesheet" href="https://esm.sh/codemirror@5.65.16/lib/codemirror.css">
  <link rel="stylesheet" href="https://esm.sh/codemirror@5.65.16/theme/material-darker.css">
  <link rel="stylesheet" href="./css/shower.css">
  <script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/lib/codemirror.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/mode/javascript/javascript.min.js"></script>
</head>
<body>
  <div id="appShell">
    <header class="showerHeader">
      <a class="brand" href="../../../website/index.html#/examples">
        <img src="../../../assets/img/ThreeJSON.png" alt="ThreeJSON">
      </a>
      <div class="titleBlock">
        <div id="exampleTitle">ThreeJSON Shower</div>
        <span id="statusText">Ready</span>
      </div>
      <div class="headerTools">
        <label class="selectTool">
          <span data-i18n="themeLabel">主题</span>
          <select id="themeSelect" aria-label="Theme">
            <option value="auto" data-i18n="themeAuto">自动</option>
            <option value="light" data-i18n="themeLight">浅色</option>
            <option value="dark" data-i18n="themeDark">深色</option>
          </select>
        </label>
        <label class="selectTool">
          <span data-i18n="langLabel">语言</span>
          <select id="langSelect" aria-label="Language">
            <option value="auto" data-i18n="langAuto">自动</option>
            <option value="zh-CN" data-i18n="langZh">简体中文</option>
            <option value="en-US" data-i18n="langEn">English</option>
          </select>
        </label>
      </div>
    </header>
    <main class="workspace">
      <section class="leftPane">
        <nav class="tabs">
          <button class="tab active" data-tab="core" type="button" data-i18n="coreJson">核心JSON</button>
          <button class="tab" data-tab="full" type="button" data-i18n="fullJson">完整JSON</button>
          <button class="tab" data-tab="tree" type="button" data-i18n="sceneTree">场景树</button>
          <div class="toolbarSpacer"></div>
          <button id="catalogToggleBtn" class="ghostButton" type="button" data-i18n="catalog">目录</button>
        </nav>
        <div class="editorToolbar" id="jsonToolbar">
          <div class="segmented" id="jsonFormatSwitch">
            <button id="friendlyBtn" type="button" data-i18n="friendlyJson">友好</button>
            <button id="standardBtn" type="button" data-i18n="standardJson">标准</button>
          </div>
          <button id="openInEditorBtn" class="linkButton" type="button" data-i18n="openInEditor">在编辑器内打开</button>
          <div class="toolbarSpacer"></div>
          <label class="autoRunLabel">
            <input id="autoRunCheckbox" type="checkbox">
            <span data-i18n="autoRun">实时渲染</span>
          </label>
          <button id="formatBtn" type="button" data-i18n="format">格式化</button>
          <button id="runBtn" class="primary" type="button" data-i18n="run">运行</button>
        </div>
        <div id="leftContent" class="leftContent">
          <aside id="exampleCatalogPanel" class="exampleCatalogPanel" hidden></aside>
          <div id="editorPanel" class="editorPanel"></div>
          <div id="treePanel" class="treePanel" hidden></div>
        </div>
      </section>
      <section class="rightPane">
        <div class="canvasToolbar">
          <button id="downloadHtmlBtn" type="button" data-i18n="downloadHtml">Download This Example</button>
          <div class="menu">
            <button type="button" data-i18n="export">Export This Scene</button>
            <div class="menuPanel">
              <button id="exportThreeJsonBtn" type="button">ThreeJSON</button>
              <button id="exportNativeBtn" type="button" data-i18n="nativeJson">原生JSON</button>
              <button id="exportModelBtn" type="button" data-i18n="modelExport">三方模型</button>
            </div>
          </div>
          <div class="toolbarSpacer"></div>
          <button id="threeViewBtn" type="button" data-i18n="threeView">三视图</button>
          <button id="fitBtn" type="button" data-i18n="fit">自适应</button>
          <button id="fullscreenBtn" type="button" data-i18n="fullscreen">全屏</button>
        </div>
        <div id="canvasWrap">
          <canvas id="canvasContainer">WebGL required</canvas>
          <div id="loadingMask">Loading...</div>
        </div>
      </section>
    </main>
  </div>
  <div id="messageToast" class="messageToast" role="status" aria-live="polite"></div>
  <div id="templateExportModal" class="modalOverlay" role="dialog" aria-modal="true" aria-labelledby="templateExportTitle" hidden>
    <div class="modalDialog">
      <div class="modalHeader" id="templateExportTitle" data-i18n="templateExportTitle">Export Template</div>
      <div class="modalBody">
        <label class="modalField" for="templateExportTypeSelect">
          <span data-i18n="templateExportType">Template type</span>
          <select id="templateExportTypeSelect">
            <option value="html">HTML</option>
            <option value="react">React</option>
            <option value="vue">Vue</option>
            <option value="electron">Electron</option>
          </select>
        </label>
        <label class="modalField" for="templateExportFormatSelect">
          <span data-i18n="templateExportFormat">JSON format</span>
          <select id="templateExportFormatSelect">
            <option value="standard">standard</option>
            <option value="friendly">friendly</option>
          </select>
        </label>
        <label class="modalField" for="templateExportJsonLocationSelect">
          <span data-i18n="templateExportJsonLocation">JSON location</span>
          <select id="templateExportJsonLocationSelect">
            <option value="inline" data-i18n="templateExportJsonInline">Inline</option>
            <option value="external" data-i18n="templateExportJsonExternal">External</option>
          </select>
        </label>
        <p class="modalHint" data-i18n="templateExportHint">HTML + inline JSON downloads a single HTML file; other combinations download a zip template.</p>
      </div>
      <div class="modalFooter">
        <button id="templateExportCancelBtn" type="button" data-i18n="cancel">Cancel</button>
        <button id="templateExportConfirmBtn" class="primary" type="button" data-i18n="confirmExport">Export</button>
      </div>
    </div>
  </div>
  <div id="modelExportModal" class="modalOverlay" role="dialog" aria-modal="true" aria-labelledby="modelExportTitle" hidden>
    <div class="modalDialog">
      <div class="modalHeader" id="modelExportTitle" data-i18n="modelExportTitle">Export Model</div>
      <div class="modalBody">
        <label class="modalField" for="modelExportFormatSelect">
          <span data-i18n="modelExportFormat">Format</span>
          <select id="modelExportFormatSelect">
            <option value="glb">GLB</option>
            <option value="gltf">GLTF</option>
            <option value="obj">OBJ</option>
            <option value="stl">STL</option>
            <option value="ply">PLY</option>
            <option value="usdz">USDZ</option>
          </select>
        </label>
        <p class="modalHint" data-i18n="modelExportHint">GLB is recommended. OBJ/STL/PLY mainly export geometry; USDZ is suitable for iOS AR preview.</p>
      </div>
      <div class="modalFooter">
        <button id="modelExportCancelBtn" type="button" data-i18n="cancel">Cancel</button>
        <button id="modelExportConfirmBtn" class="primary" type="button" data-i18n="confirmExport">Export</button>
      </div>
    </div>
  </div>
  <script type="module" src="./js/main.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scene Player</title>
  <link rel="icon" href="../../../assets/img/threejson.ico" type="image/x-icon">
  <script type="importmap">
    {
      "imports": {
        "threejson": "../../../builtins/full.js",
        "threejson/core": "../../../core/index.js",
        "three": "https://esm.sh/three@0.184.0",
        "three/examples/jsm/": "https://esm.sh/three@0.184.0/examples/jsm/",
        "fflate": "https://esm.sh/fflate@0.8.3",
        "@tweenjs/tween.js": "https://esm.sh/@tweenjs/tween.js@25.0.0",
        "html2canvas-pro": "https://esm.sh/html2canvas-pro@2.0.4",
        "gifuct-js": "https://esm.sh/gifuct-js@2.1.2",
        "three-mesh-bvh": "https://esm.sh/three-mesh-bvh@0.9.10?deps=three@0.184.0",
        "three-bvh-csg": "https://esm.sh/three-bvh-csg@0.0.18?deps=three@0.184.0,three-mesh-bvh@0.9.10",
        "troika-three-text": "https://esm.sh/troika-three-text@0.52.4?deps=three@0.184.0"
      }
    }
  </script>
  <link rel="stylesheet" href="./css/player-shell.css">
</head>
<body>
  <div id="rootContainer" class="rightPanelOpen">
    <header class="topBar" id="topBar">
      <div class="appIconSlot" title="ScenePlayer" aria-hidden="true">3J</div>
      <nav class="topMenubar" data-i18n-aria="player.shell.topMenubar" aria-label="Main menu">
        <details class="topMenu">
          <summary data-i18n="player.menu.file">File</summary>
          <div class="topDropdown">
            <button type="button" id="menuOpenSceneJson" data-i18n="player.shell.menuOpenSceneJson">Open</button>
            <button type="button" id="menuLoadSceneJson" data-i18n="player.shell.menuLoadSceneJson">Load ThreeJSON</button>
            <button type="button" id="menuLoadNativeThreeJson" data-i18n="player.shell.menuLoadNativeThreeJson">Load Native JSON</button>
            <button type="button" id="menuLoadTjzArchive" data-i18n="player.shell.menuLoadTjzArchive">Load .tjz Archive</button>
          </div>
        </details>
        <details class="topMenu">
          <summary data-i18n="player.menu.view">View</summary>
          <div class="topDropdown">
            <button type="button" id="menuViewSceneJson" data-i18n="player.shell.menuViewSceneJson">View Scene JSON</button>
            <button type="button" id="menuFitView" data-i18n="player.shell.menuFitView">Fit to View</button>
            <button type="button" id="menuFullscreenToggle" data-i18n="player.shell.menuFullscreenToggle">Fullscreen</button>
          </div>
        </details>
        <details class="topMenu">
          <summary data-i18n="player.menu.settings">Settings</summary>
          <div class="topDropdown">
            <button type="button" id="menuOpenPlayerSettings" data-i18n="player.shell.menuOpenPlayerSettings">Player Settings...</button>
          </div>
        </details>
        <details class="topMenu">
          <summary data-i18n="player.menu.help">Help</summary>
          <div class="topDropdown">
            <button type="button" id="menuHelpUserManual" data-i18n="player.shell.menuHelpUserManual">User Manual</button>
            <button type="button" id="menuClearPlayerSettingsCache" data-i18n="player.shell.menuClearPlayerSettingsCache">Clear Settings Cache</button>
            <button type="button" id="menuHelpAbout" data-i18n="player.shell.menuHelpAbout">About</button>
          </div>
        </details>
      </nav>
      <div class="topBarCenter" id="topBarSceneTitle" data-i18n="player.shell.topBarSceneTitle">Scene Player</div>
      <div class="topBarSpacer"></div>
      <div class="topBarTrailing">
        <input id="sceneJsonFileInput" type="file" accept=".json,.threejson,.tjson,.tjz,application/json" hidden>
        <input id="nativeThreeJsonFileInput" type="file" accept=".json,application/json" hidden>
        <input id="tjzArchiveFileInput" type="file" accept=".tjz" hidden>
        <input id="playlistAddSingleFileInput" type="file" accept=".json,.threejson,.tjson,application/json" hidden>
        <input id="playlistAddTjzFileInput" type="file" accept=".tjz" hidden>
        <input id="playlistFolderInput" type="file" accept=".json,.threejson,.tjson,.tjz,application/json" webkitdirectory hidden>
        <button class="toolBtn secondary" id="playlistOpenBtn" type="button" title="Pick JSON or .tjz and open for playback" data-i18n="player.shell.playlistOpenBtn" data-i18n-title="player.shell.playlistOpenBtn.title">Open</button>
        <details class="playlistAddMenu" id="playlistAddMenu">
          <summary class="toolBtn secondary playlistAddSummary" data-i18n="player.shell.playlistAddSummary">Add</summary>
          <div class="playlistAddDropdown">
            <button type="button" id="playlistAddJsonFileBtn" data-i18n="player.shell.playlistAddJsonFileBtn">Add JSON File...</button>
            <button type="button" id="playlistAddTjzFileBtn" data-i18n="player.shell.playlistAddTjzFileBtn">Add .tjz Archive...</button>
            <button type="button" id="playlistAddFolderBtn" data-i18n="player.shell.playlistAddFolderBtn">Add Folder...</button>
          </div>
        </details>
        <button class="toolBtn secondary" id="toolbarResetViewBtn" type="button" title="Fit camera to current scene" data-i18n="player.shell.toolbarResetViewBtn" data-i18n-title="player.shell.toolbarResetViewBtn.title">Reset</button>
        <button class="toolBtn secondary" id="fullscreenBtn" type="button" data-i18n="player.shell.fullscreenBtn">Fullscreen</button>
      </div>
    </header>

    <div class="centerWorkspace" id="centerWorkspace">
      <main id="canvasWrap">
        <canvas id="canvasContainer">WebGL is required.</canvas>
        <div id="loadingMask" aria-live="polite" data-i18n="player.shell.loadingMask">Loading 3D scene...</div>
        <div id="messageBox" role="status" aria-live="polite"></div>
        <div id="canvasIdleOverlay" class="canvasIdleOverlay" aria-hidden="true">
          <button type="button" class="toolBtn secondary" id="idleOpenSceneBtn" data-i18n="player.shell.idleOpenSceneBtn">Open</button>
          <button type="button" class="playerStartupSampleBtn" id="idleOpenDefaultSceneBtn" data-i18n="player.shell.idleOpenDefaultSceneBtn">Open Sample Scene</button>
          <input id="idleOpenSceneInput" type="file" accept=".json,.threejson,.tjson,.tjz,application/json" hidden>
        </div>
      </main>

      <div id="rightDock" class="rightDock">
        <aside id="rightPanel" class="sidePanel rightDockPanel">
          <div class="panelCard playlistPanelCard">
            <div class="playlistPanelHeader">
              <div class="panelTitle" data-i18n="player.shell.playlistPanelTitle">Playlist</div>
              <button type="button" class="miniBtn" id="playlistClearBtn" title="Clear list and stop playback" data-i18n="player.shell.playlistClearBtn" data-i18n-title="player.shell.playlistClearBtn.title">Clear</button>
            </div>
            <div id="playlistList" class="playlistList" aria-label="Scene playlist" data-i18n-aria="player.shell.playlistList"></div>
          </div>
        </aside>
      </div>
    </div>

    <footer class="bottomBar" id="bottomBar">
      <div class="bottomBarTransport">
        <button type="button" class="transportBtn secondary" id="bottomBtnPrev" title="Previous" data-i18n-title="player.shell.bottomBtnPrev.title">⏮</button>
        <button type="button" class="transportBtn" id="bottomBtnPlayPause" title="Pause" data-i18n-title="player.shell.bottomBtnPlayPause.title">▶</button>
        <button type="button" class="transportBtn secondary" id="bottomBtnNext" title="Next" data-i18n-title="player.shell.bottomBtnNext.title">⏭</button>
        <button type="button" class="transportBtn secondary" id="bottomBtnStop" title="Stop and unload scene" data-i18n-title="player.shell.bottomBtnStop.title">⏹</button>
        <button type="button" class="transportBtn secondary" id="bottomBtnOpen" title="Open JSON or .tjz" data-i18n-title="player.shell.bottomBtnOpen.title">⊕</button>
        <button type="button" class="transportBtn secondary" id="bottomBtnFullscreen" title="Fullscreen" data-i18n-title="player.shell.bottomBtnFullscreen.title">⛶</button>
      </div>
      <div class="bottomBarTrailing">
        <div class="volumeControl">
          <button type="button" class="transportBtn secondary volumeBtn" id="playerVolumeMuteBtn" title="Mute" aria-label="Mute" data-i18n-title="player.shell.playerVolumeMuteBtn.title" data-i18n-aria="player.shell.playerVolumeMuteBtn.aria">&#128266;</button>
          <input type="range" id="playerVolumeSlider" min="0" max="100" value="100" title="Volume" aria-label="Volume" data-i18n-title="player.shell.playerVolumeSlider.title" data-i18n-aria="player.shell.playerVolumeSlider.aria">
        </div>
        <button type="button" class="transportBtn secondary" id="bottomBarPlaylistToggle" aria-controls="rightPanel" aria-expanded="true" title="Collapse playlist" data-i18n-title="player.shell.bottomBarPlaylistToggle.title">&#9776;</button>
      </div>
    </footer>

    <div id="immersiveTopEdgeStrip" class="immersiveEdgeStrip immersiveTopEdgeStrip" aria-hidden="true"></div>
    <div id="immersiveBottomEdgeStrip" class="immersiveEdgeStrip immersiveBottomEdgeStrip" aria-hidden="true"></div>
    <div id="immersiveRightEdgeStrip" class="immersiveRightEdgeStrip" aria-hidden="true"></div>
  </div>

  <div id="sceneJsonModal" role="dialog" aria-modal="true" aria-label="Scene JSON viewer" data-i18n-aria="player.shell.sceneJsonModal.aria">
    <div class="sceneJsonDialog">
      <div class="sceneJsonDialogHeader">
        <span data-i18n="player.shell.sceneJsonDialogTitle">Current Scene JSON</span>
        <div class="sceneJsonDialogActions">
          <button class="miniBtn" id="copyJsonBtn" type="button" data-i18n="player.shell.copyJsonBtn">Copy</button>
          <button class="miniBtn" id="closeJsonBtn" type="button" data-i18n="player.shell.closeJsonBtn">Close</button>
        </div>
      </div>
      <textarea id="sceneJsonContent" spellcheck="false" readonly></textarea>
    </div>
  </div>

  <div id="helpAboutModal" role="dialog" aria-modal="true" aria-labelledby="helpAboutTitle">
    <div class="helpAboutDialog">
      <div class="helpAboutHeader" id="helpAboutTitle" data-i18n="player.shell.helpAboutTitle">About</div>
      <div class="helpAboutBody" id="helpAboutBodyText">ScenePlayer 1.0.0
Powered by ThreeJSON and Three.js</div>
      <div class="helpAboutFooter">
        <button class="miniBtn" id="helpAboutCloseBtn" type="button" data-i18n="player.shell.helpAboutCloseBtn">Close</button>
      </div>
    </div>
  </div>

  <div id="playerSettingsModal" role="dialog" aria-modal="true" aria-labelledby="playerSettingsTitle" hidden>
    <div class="playerSettingsDialog">
      <div class="playerSettingsHeader" id="playerSettingsTitle">Player Settings</div>
      <div class="playerSettingsBody">
        <nav class="playerSettingsNav" id="playerSettingsNav" aria-label="Settings categories"></nav>
        <div class="playerSettingsScroll" id="playerSettingsScroll"></div>
      </div>
      <div class="playerSettingsFooter">
        <button class="miniBtn" id="playerSettingsResetBtn" type="button">Reset to Defaults</button>
        <button class="miniBtn" id="playerSettingsSaveBtn" type="button">Save & Apply</button>
        <button class="miniBtn" id="playerSettingsCancelBtn" type="button">Cancel</button>
      </div>
    </div>
  </div>

  <div id="playlistContextMenu" role="menu" aria-label="Playlist menu" data-i18n-aria="player.shell.playlistContextMenu.aria">
    <button type="button" id="playlistContextPlayBtn" role="menuitem" data-i18n="player.shell.playlistContextPlayBtn">Play</button>
    <button type="button" id="playlistContextReloadBtn" role="menuitem" data-i18n="player.shell.playlistContextReloadBtn">Reload</button>
    <div class="playlistContextItem" id="playlistContextCopyItem" role="none">
      <div class="playlistContextItemLabel" role="menuitem" tabindex="-1">
        <span data-i18n="player.shell.playlistContextCopyLabel">Copy</span>
        <span class="playlistContextArrow" aria-hidden="true">></span>
      </div>
      <div class="playlistContextSubmenu" role="menu" aria-label="Copy">
        <button type="button" id="playlistContextCopyPathBtn" role="menuitem" data-i18n="player.shell.playlistContextCopyPathBtn">Copy Path</button>
        <button type="button" id="playlistContextCopyNameBtn" role="menuitem" data-i18n="player.shell.playlistContextCopyNameBtn">Copy Name</button>
      </div>
    </div>
    <button type="button" id="playlistContextRemoveBtn" role="menuitem" data-i18n="player.shell.playlistContextRemoveBtn">Remove</button>
  </div>

  <script type="module" src="./js/main.js"></script>
</body>
</html>

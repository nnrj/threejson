<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>场景播放器</title>
  <link rel="icon" href="./assets/img/threejson.ico" type="image/x-icon">
  <script type="importmap">
    
    {
      "imports": {
        "threejson": "/builtins/full.js",
        "threejson/core": "/core/index.js",
        "three": "https://esm.sh/three@0.184.0",
        "three/examples/jsm/": "https://esm.sh/three@0.184.0/examples/jsm/",
        "fflate": "https://esm.sh/fflate@0.8.3",
        "@tweenjs/tween.js": "https://esm.sh/@tweenjs/tween.js@25.0.0",
        "html2canvas-pro": "https://esm.sh/html2canvas-pro@2.0.4",
        "gifuct-js": "https://esm.sh/gifuct-js@2.1.2",
        "three-mesh-bvh": "https://esm.sh/three-mesh-bvh@0.9.10?deps=three@0.184.0",
        "three-bvh-csg": "https://esm.sh/three-bvh-csg@0.0.18?deps=three@0.184.0,three-mesh-bvh@0.9.10",
        "troika-three-text": "https://esm.sh/troika-three-text@0.52.4?deps=three@0.184.0"
      }
    }
  
  </script>
  <style>
    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #2f2f2f;
      font-family: Arial, "Microsoft YaHei", sans-serif;
      color: #cfcfcf;
    }

    * {
      box-sizing: border-box;
    }

    /* 统一细滚动条（纵/横同风格，与编辑器属性面板一致） */
    .appThinScrollbar,
    .playerSettingsNav,
    .playerSettingsScroll,
    .sidePanel,
    .playlistList {
      scrollbar-width: thin;
      scrollbar-color: #4d525a rgba(20, 22, 26, 0.55);
    }

    .appThinScrollbar::-webkit-scrollbar,
    .playerSettingsNav::-webkit-scrollbar,
    .playerSettingsScroll::-webkit-scrollbar,
    .sidePanel::-webkit-scrollbar,
    .playlistList::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    .appThinScrollbar::-webkit-scrollbar-track,
    .playerSettingsNav::-webkit-scrollbar-track,
    .playerSettingsScroll::-webkit-scrollbar-track,
    .sidePanel::-webkit-scrollbar-track,
    .playlistList::-webkit-scrollbar-track {
      margin: 2px;
      background: rgba(20, 22, 26, 0.5);
      border-radius: 4px;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.05);
    }

    .appThinScrollbar::-webkit-scrollbar-thumb,
    .playerSettingsNav::-webkit-scrollbar-thumb,
    .playerSettingsScroll::-webkit-scrollbar-thumb,
    .sidePanel::-webkit-scrollbar-thumb,
    .playlistList::-webkit-scrollbar-thumb {
      background: #4d525a;
      border-radius: 4px;
      border: 2px solid transparent;
      background-clip: padding-box;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08);
    }

    .appThinScrollbar::-webkit-scrollbar-thumb:hover,
    .playerSettingsNav::-webkit-scrollbar-thumb:hover,
    .playerSettingsScroll::-webkit-scrollbar-thumb:hover,
    .sidePanel::-webkit-scrollbar-thumb:hover,
    .playlistList::-webkit-scrollbar-thumb:hover {
      background: #5c6470;
      background-clip: padding-box;
    }

    .appThinScrollbar::-webkit-scrollbar-thumb:active,
    .playerSettingsNav::-webkit-scrollbar-thumb:active,
    .playerSettingsScroll::-webkit-scrollbar-thumb:active,
    .sidePanel::-webkit-scrollbar-thumb:active,
    .playlistList::-webkit-scrollbar-thumb:active {
      background: #3d6d9e;
      background-clip: padding-box;
    }

    #rootContainer {
      position: relative;
      width: 100%;
      max-width: 100%;
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
      display: grid;
      grid-template-rows: 40px 1fr 36px;
      grid-template-columns: 1fr;
      grid-template-areas:
        "top"
        "workspace"
        "bottom";
      background: #2f2f2f;
      color-scheme: dark;
      --editor-field-bg: #1f242b;
      --editor-field-border: rgba(255, 255, 255, 0.2);
      --editor-field-border-focus: rgba(64, 158, 255, 0.55);
      --editor-field-color: #e5e9ef;
      --editor-field-radius: 4px;
      --editor-field-padding: 6px 8px;
      --editor-field-font-size: 11px;
      --editor-checkbox-size: 14px;
      --editor-checkbox-bg: #1a1e24;
      --editor-checkbox-border: rgba(255, 255, 255, 0.32);
      --editor-checkbox-checked: #409eff;
    }

    /* 与 scene-editor 一致的深色复选框 */
    #rootContainer input[type="checkbox"] {
      -webkit-appearance: none;
      appearance: none;
      box-sizing: border-box;
      width: var(--editor-checkbox-size);
      height: var(--editor-checkbox-size);
      min-width: var(--editor-checkbox-size);
      margin: 0;
      padding: 0;
      border: 1px solid var(--editor-checkbox-border);
      border-radius: 3px;
      background: var(--editor-checkbox-bg);
      cursor: pointer;
      flex-shrink: 0;
      vertical-align: middle;
      position: relative;
      transition: background-color 0.12s ease, border-color 0.12s ease;
    }

    #rootContainer input[type="checkbox"]:hover {
      border-color: rgba(64, 158, 255, 0.65);
    }

    #rootContainer input[type="checkbox"]:checked {
      background: var(--editor-checkbox-checked);
      border-color: #3078c8;
    }

    #rootContainer input[type="checkbox"]:checked::after {
      content: "";
      position: absolute;
      left: 4px;
      top: 1px;
      width: 4px;
      height: 8px;
      border: solid #fff;
      border-width: 0 2px 2px 0;
      transform: rotate(45deg);
    }

    #rootContainer input[type="checkbox"]:focus-visible {
      outline: 2px solid rgba(64, 158, 255, 0.45);
      outline-offset: 1px;
    }

    #rootContainer input[type="checkbox"]:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    /* 文本框 / 下拉：与编辑器场景 JSON 侧栏一致 */
    #rootContainer #sceneJsonContent,
    #rootContainer .playerSettingsField input:not([type="checkbox"]):not([type="color"]),
    #rootContainer .playerSettingsField select,
    #rootContainer .playerSettingsField textarea {
      box-sizing: border-box;
      border: 1px solid var(--editor-field-border);
      border-radius: var(--editor-field-radius);
      background: var(--editor-field-bg);
      color: var(--editor-field-color);
      outline: none;
    }

    #rootContainer #sceneJsonContent:focus,
    #rootContainer .playerSettingsField input:not([type="checkbox"]):not([type="color"]):focus,
    #rootContainer .playerSettingsField select:focus,
    #rootContainer .playerSettingsField textarea:focus {
      border-color: var(--editor-field-border-focus);
    }

    #rootContainer .playerSettingsField select {
      cursor: pointer;
    }

    #rootContainer .playerSettingsField select option {
      background: #1f242b;
      color: #e5e9ef;
    }

    #rootContainer.immersiveFullscreen {
      grid-template-rows: 1fr;
      grid-template-areas: "workspace";
    }

    #rootContainer.immersiveFullscreen .topBar,
    #rootContainer.immersiveFullscreen .bottomBar {
      position: fixed;
      left: 0;
      right: 0;
      z-index: 290;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.16s ease, transform 0.2s ease;
    }

    #rootContainer.immersiveFullscreen .topBar {
      display: flex !important;
      top: 0;
      bottom: auto;
      transform: translateY(-100%);
    }

    #rootContainer.immersiveFullscreen .bottomBar {
      display: grid !important;
      bottom: 0;
      top: auto;
      transform: translateY(100%);
    }

    #rootContainer.immersiveFullscreen .topBar.immersiveChromeVisible,
    #rootContainer.immersiveFullscreen .bottomBar.immersiveChromeVisible {
      opacity: 1;
      pointer-events: auto;
      transform: translateY(0);
    }

    .centerWorkspace {
      grid-area: workspace;
      display: grid;
      grid-template-columns: minmax(0, 1fr) max-content;
      grid-template-rows: 1fr;
      min-width: 0;
      min-height: 0;
      position: relative;
    }

    #rootContainer.immersiveFullscreen .centerWorkspace {
      display: block;
      position: relative;
      height: 100%;
      min-height: 0;
    }

    #rootContainer.immersiveFullscreen #canvasWrap {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    #rootContainer.immersiveFullscreen #rightDock {
      position: fixed;
      top: 0;
      right: 0;
      height: 100vh;
      height: 100dvh;
      z-index: 288;
      transform: translateX(100%);
      transition: transform 0.22s ease;
      grid-area: unset;
    }

    #rootContainer.immersiveFullscreen #rightDock.immersiveDockVisible {
      transform: translateX(0);
    }

    .immersiveRightEdgeStrip {
      display: none;
      position: fixed;
      top: 0;
      right: 0;
      width: 22px;
      height: 100vh;
      height: 100dvh;
      z-index: 287;
      background: transparent;
      pointer-events: auto;
    }

    #rootContainer.immersiveFullscreen .immersiveRightEdgeStrip {
      display: block;
    }

    .immersiveEdgeStrip {
      display: none;
      position: fixed;
      left: 0;
      right: 0;
      z-index: 287;
      background: transparent;
      pointer-events: auto;
    }

    #rootContainer.immersiveFullscreen .immersiveEdgeStrip {
      display: block;
    }

    .immersiveTopEdgeStrip {
      top: 0;
      height: 16px;
    }

    .immersiveBottomEdgeStrip {
      bottom: 0;
      height: 16px;
    }

    .bottomBar {
      grid-area: bottom;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      padding: 0 10px;
      gap: 10px;
      background: #3c3c3c;
      border-top: 1px solid #4d4d4d;
      flex-shrink: 0;
      min-height: 36px;
    }

    .bottomBarTransport {
      grid-column: 2;
      justify-self: center;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .bottomBarTrailing {
      grid-column: 3;
      justify-self: end;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .volumeControl {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .volumeControl .volumeBtn {
      min-width: 32px;
      padding: 0 8px;
    }

    .volumeControl input[type="range"] {
      width: 88px;
      height: 4px;
      margin: 0;
      accent-color: #409eff;
      cursor: pointer;
    }

    .transportBtn {
      min-width: 36px;
      height: 30px;
      padding: 0 10px;
      border: 1px solid rgba(255, 255, 255, 0.24);
      border-radius: 4px;
      color: #fff;
      background: #409eff;
      cursor: pointer;
      font-size: 15px;
      line-height: 1;
      font-family: "Segoe UI Symbol", "Noto Sans Symbols2", "Apple Symbols", sans-serif;
    }

    .transportBtn:hover {
      background: #66b1ff;
    }

    .transportBtn.secondary {
      background: #606266;
    }

    .transportBtn.secondary:hover {
      background: #7a7c80;
    }

    .transportBtn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .topBar {
      grid-area: top;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 8px;
      min-width: 0;
      position: relative;
      z-index: 200;
      background: #3c3c3c;
      border-bottom: 1px solid #4d4d4d;
    }

    .appIconSlot {
      flex: 0 0 40px;
      width: 40px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 4px;
      color: #8ecbff;
      background: rgba(0, 0, 0, 0.2);
      font-size: 17px;
      line-height: 1;
      -webkit-user-select: none;
      user-select: none;
    }

    .topMenubar {
      display: flex;
      align-items: center;
      gap: 2px;
      flex: 0 1 auto;
      min-width: 0;
      overflow: visible;
    }

    .topMenu {
      position: relative;
    }

    .topMenu > summary {
      list-style: none;
      height: 28px;
      padding: 0 12px;
      border: 1px solid transparent;
      border-radius: 4px;
      color: #e8e8e8;
      background: transparent;
      font-size: 13px;
      line-height: 26px;
      cursor: pointer;
      white-space: nowrap;
    }

    .topMenu > summary:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(255, 255, 255, 0.12);
    }

    .topMenu > summary::-webkit-details-marker {
      display: none;
    }

    .topMenu[open] > summary {
      background: rgba(255, 255, 255, 0.1);
      border-color: rgba(255, 255, 255, 0.18);
    }

    .topDropdown {
      position: absolute;
      top: calc(100% + 4px);
      left: 0;
      min-width: 168px;
      padding: 6px;
      border-radius: 6px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      background: rgba(36, 38, 42, 0.98);
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.45);
      z-index: 120;
    }

    .topDropdown button {
      display: block;
      width: 100%;
      margin: 2px 0;
      padding: 6px 10px;
      border: 1px solid transparent;
      border-radius: 4px;
      color: #e6e8ec;
      background: transparent;
      font-size: 12px;
      text-align: left;
      cursor: pointer;
    }

    .topDropdown button:hover {
      background: rgba(64, 158, 255, 0.28);
      border-color: rgba(64, 158, 255, 0.35);
    }

    .topBarCenter {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      max-width: min(480px, 46vw);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: #e8e8e8;
      font-size: 13px;
      line-height: 1;
      -webkit-user-select: none;
      user-select: none;
    }

    .topBarSpacer {
      flex: 1 1 auto;
      min-width: 4px;
    }

    .topBarTrailing {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
      margin-left: auto;
    }

    .toolBtn {
      height: 28px;
      padding: 0 10px;
      border: 1px solid rgba(255, 255, 255, 0.24);
      border-radius: 4px;
      color: #fff;
      background: #409eff;
      cursor: pointer;
      font-size: 12px;
    }

    .toolBtn:hover {
      background: #66b1ff;
    }

    .toolBtn.secondary {
      background: #606266;
    }

    .toolBtn.secondary:hover {
      background: #7a7c80;
    }

    #canvasWrap {
      grid-column: 1;
      position: relative;
      min-width: 0;
      min-height: 0;
      height: 100%;
      /*background: #2f2f2f url("/assets/textures/environment/skybox/galaxy.jpg") center center / cover no-repeat;*/
    }

    #rootContainer.immersiveFullscreen #canvasWrap {
      grid-column: unset;
    }

    #canvasContainer {
      display: block;
      width: 100%;
      height: 100%;
      outline: none;
    }

    .sidePanel {
      overflow: auto;
      padding: 6px 8px;
      background: #2f2f2f;
    }

    .rightDock {
      grid-column: 2;
      display: flex;
      flex-direction: row;
      align-items: stretch;
      justify-content: flex-end;
      height: 100%;
      min-height: 0;
      width: 0;
      min-width: 0;
      max-width: 238px;
      overflow: hidden;
      transition: width 0.18s ease, min-width 0.18s ease;
    }

    #rootContainer.immersiveFullscreen .rightDock {
      max-width: 238px;
    }

    #rootContainer.rightPanelOpen .rightDock {
      width: 238px;
      min-width: 238px;
    }

    .rightDockPanel {
      flex: 1 1 220px;
      min-width: 0;
      max-width: 220px;
      overflow: hidden;
      border-left: 1px solid #414141;
    }

    #rightPanel.sidePanel.rightDockPanel {
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    #rootContainer:not(.rightPanelOpen) .rightDockPanel {
      flex: 0 0 0;
      max-width: 0;
      padding-left: 0;
      padding-right: 0;
      overflow: hidden;
      border-left-width: 0;
      visibility: hidden;
    }

    .panelCard {
      margin-bottom: 8px;
      padding: 6px;
      background: #3d3d3d;
      border-radius: 3px;
    }

    .playlistPanelCard {
      flex: 1 1 0;
      display: flex;
      flex-direction: column;
      min-height: 0;
      margin-bottom: 0;
    }

    .playlistPanelHeader {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 6px;
      flex-shrink: 0;
    }

    .playlistPanelHeader .panelTitle {
      margin: 0;
    }

    #playlistClearBtn {
      flex-shrink: 0;
    }

    .playlistList {
      flex: 1 1 0;
      min-height: 120px;
      max-height: 48vh;
      overflow: auto;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .playlistRow {
      display: block;
      width: 100%;
      padding: 7px 8px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 4px;
      background: #33363c;
      color: #d8dde8;
      font-size: 12px;
      text-align: left;
      cursor: pointer;
      font-family: inherit;
    }

    .playlistRow:hover {
      background: #3e4450;
    }

    .playlistRowActive {
      border-color: rgba(64, 158, 255, 0.55);
      background: rgba(64, 158, 255, 0.22);
      color: #fff;
    }

    #playlistContextMenu {
      position: fixed;
      z-index: 80;
      min-width: 146px;
      display: none;
      overflow: visible;
      background: rgba(28, 30, 35, 0.98);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 6px;
      box-shadow: 0 12px 28px rgba(0, 0, 0, 0.35);
      padding: 6px;
      color: #e6e6e6;
      font-size: 12px;
      user-select: none;
    }

    #playlistContextMenu.visible {
      display: block;
    }

    #playlistContextMenu button {
      width: 100%;
      border: none;
      border-radius: 4px;
      padding: 6px 10px;
      text-align: left;
      background: transparent;
      color: #e6e6e6;
      cursor: pointer;
      font-size: 12px;
    }

    #playlistContextMenu button:hover {
      background: rgba(255, 255, 255, 0.09);
    }

    #playlistContextMenu > button + button,
    #playlistContextMenu > button + .playlistContextItem,
    #playlistContextMenu > .playlistContextItem + button {
      margin-top: 2px;
    }

    .playlistContextItem {
      position: relative;
    }

    .playlistContextItemLabel {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      border-radius: 4px;
      padding: 6px 10px;
      color: #e6e6e6;
      background: transparent;
      cursor: default;
    }

    .playlistContextItem:hover > .playlistContextItemLabel {
      background: rgba(255, 255, 255, 0.09);
    }

    .playlistContextSubmenu {
      position: absolute;
      top: 0;
      left: calc(100% + 4px);
      min-width: 132px;
      display: none;
      z-index: 1;
      background: rgba(28, 30, 35, 0.98);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 6px;
      box-shadow: 0 12px 28px rgba(0, 0, 0, 0.35);
      padding: 6px;
    }

    .playlistContextItem:hover > .playlistContextSubmenu {
      display: block;
    }

    .playlistContextItem.submenuFlipLeft > .playlistContextSubmenu {
      left: auto;
      right: calc(100% + 4px);
    }

    .playlistContextSubmenu button {
      width: 100%;
      border: none;
      border-radius: 4px;
      padding: 6px 10px;
      text-align: left;
      background: transparent;
      color: #e6e6e6;
      cursor: pointer;
      font-size: 12px;
    }

    .playlistContextSubmenu button:hover {
      background: rgba(255, 255, 255, 0.09);
    }

    .playlistAddMenu {
      position: relative;
    }

    .topBarTrailing .playlistAddMenu {
      margin-top: 0;
    }

    .playlistAddSummary {
      list-style: none;
      box-sizing: border-box;
    }

    .topBarTrailing .playlistAddSummary {
      width: auto;
      min-width: 52px;
      height: 28px;
      line-height: 26px;
      margin: 0;
    }

    .playlistAddSummary::-webkit-details-marker {
      display: none;
    }

    .playlistAddDropdown {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .topBarTrailing .playlistAddDropdown {
      position: absolute;
      top: calc(100% + 4px);
      right: 0;
      left: auto;
      margin-top: 0;
      min-width: 172px;
      padding: 6px;
      border-radius: 6px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      background: rgba(36, 38, 42, 0.98);
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.45);
      z-index: 130;
    }

    .playlistAddDropdown button {
      display: block;
      width: 100%;
      padding: 6px 8px;
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 4px;
      background: #4a4c51;
      color: #e0e4ea;
      font-size: 11px;
      text-align: left;
      cursor: pointer;
      font-family: inherit;
    }

    .playlistAddDropdown button:hover {
      background: #55585e;
    }

    #loadingMask {
      position: absolute;
      inset: 0;
      z-index: 30;
      display: none;
      align-items: center;
      justify-content: center;
      color: #fff;
      background: rgba(47, 47, 47, 0.72);
      font-size: 15px;
    }

    #messageBox {
      position: absolute;
      top: 10px;
      left: 50%;
      z-index: 40;
      display: none;
      max-width: 70vw;
      padding: 8px 14px;
      border-radius: 4px;
      color: #fff;
      background: rgba(20, 20, 20, 0.82);
      font-size: 13px;
      transform: translateX(-50%);
    }

    .canvasIdleOverlay {
      position: absolute;
      inset: 0;
      z-index: 25;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 9px;
      background: rgba(47, 47, 47, 0.58);
      pointer-events: none;
    }

    .canvasIdleOverlay.isVisible {
      display: flex;
      pointer-events: auto;

  function deepMergePlayerSettings(base, overlay) {
    if (!isPlainPlayerSettingsObject(base)) {
      return clonePlayerSettings(overlay || {});
    }
    const out = clonePlayerSettings(base);
    if (!isPlainPlayerSettingsObject(overlay)) {
      return out;
    }
    for (const key of Object.keys(overlay)) {
      const next = overlay[key];
      if (isPlainPlayerSettingsObject(next) && isPlainPlayerSettingsObject(out[key])) {
        out[key] = deepMergePlayerSettings(out[key], next);
      } else {
        out[key] = next;
      }
    }
    return out;
  }

  function splitPlayerSettingsPath(path) {
    return String(path || "").split(".").filter(Boolean);
  }

  function getPlayerSettingByPath(obj, path) {
    let cur = obj;
    for (const part of splitPlayerSettingsPath(path)) {
      if (cur == null) return undefined;
      cur = cur[part];
    }
    return cur;
  }

  function setPlayerSettingByPath(obj, path, value) {
    const parts = splitPlayerSettingsPath(path);
    if (!parts.length) return;
    let cur = obj;
    for (let i = 0; i < parts.length - 1; i++) {
      if (!isPlainPlayerSettingsObject(cur[parts[i]])) cur[parts[i]] = {};
      cur = cur[parts[i]];
    }
    cur[parts[parts.length - 1]] = value;
  }

  function resolvePlayerPageUrl(url) {
    const value = String(url || "").trim();
    if (value.startsWith("/assets/") || value === "/demo.html") {
      return "." + value;
    }
    return value;
  }

  function normalizePlayerSettingsUrls(settings) {
    if (settings?.general?.defaultSceneUrl) {
      settings.general.defaultSceneUrl = resolvePlayerPageUrl(settings.general.defaultSceneUrl);
    }
    return settings;
  }
  async function fetchPlayerSettingsFileDefaults() {
    try {
      const response = await fetch(PLAYER_SETTINGS_JSON_URL, { cache: "no-cache" });
      if (!response.ok) return normalizePlayerSettingsUrls(clonePlayerSettings(PLAYER_SETTINGS_DEFAULTS));
      return normalizePlayerSettingsUrls(deepMergePlayerSettings(PLAYER_SETTINGS_DEFAULTS, await response.json()));
    } catch (err) {
      console.warn("[player-settings] fetch failed:", err);
      return normalizePlayerSettingsUrls(clonePlayerSettings(PLAYER_SETTINGS_DEFAULTS));
    }
  }

  function readPlayerSettingsCache() {
    try {
      const raw = localStorage.getItem(PLAYER_SETTINGS_STORAGE_KEY);
      if (!raw) return null;
      const parsed = JSON.parse(raw);
      return isPlainPlayerSettingsObject(parsed) ? parsed : null;
    } catch {
      return null;
    }
  }

  function savePlayerSettingsCache(settings) {
    try {
      localStorage.setItem(PLAYER_SETTINGS_STORAGE_KEY, JSON.stringify(settings));
    } catch (err) {
      console.warn("[player-settings] save failed:", err);
    }
  }

  function clearPlayerSettingsCache() {
    try {
      localStorage.removeItem(PLAYER_SETTINGS_STORAGE_KEY);
    } catch {
      /* ignore */
    }
  }

  async function loadPlayerSettings() {
    playerSettingsFileDefaults = await fetchPlayerSettingsFileDefaults();
    playerSettings = normalizePlayerSettingsUrls(deepMergePlayerSettings(playerSettingsFileDefaults, readPlayerSettingsCache() || {}));
    return playerSettings;
  }

  async function reloadPlayerSettingsToFileDefaults() {
    playerSettingsFileDefaults = await fetchPlayerSettingsFileDefaults();
    playerSettings = clonePlayerSettings(playerSettingsFileDefaults);
    clearPlayerSettingsCache();
    applyPlayerSettings({ initial: true });
    return playerSettings;
  }

  function syncAudioIntoPlayerSettings() {
    if (!playerSettings?.audio) return;
    playerSettings.audio.defaultVolumePercent = Math.round(playerVolume * 100);
    playerSettings.audio.defaultMuted = playerVolumeMuted;
  }

  function persistPlayerSettingsFromRuntime() {
    if (!playerSettings) return;
    if (playerSettings.audio?.rememberVolume) {
      syncAudioIntoPlayerSettings();
    }
    savePlayerSettingsCache(clonePlayerSettings(playerSettings));
  }

  function getPlayerDefaultSceneUrl() {
    return resolvePlayerPageUrl(playerSettings?.general?.defaultSceneUrl || PLAYER_SETTINGS_DEFAULTS.general.defaultSceneUrl);
  }

  function getPlayerMessageToastDurationMs() {
    return playerSettings?.general?.messageToastDurationMs ?? PLAYER_SETTINGS_DEFAULTS.general.messageToastDurationMs;
  }

  function getSceneLoadDoneDelayMs() {
    const n = Number(playerSettings?.general?.sceneLoadDoneDelayMs);
    if (!Number.isFinite(n)) {
      return PLAYER_SETTINGS_DEFAULTS.general.sceneLoadDoneDelayMs;
    }
    return Math.min(3000, Math.max(0, Math.round(n)));
  }

  function getImmersiveChromeHideDelayMs() {
    return playerSettings?.immersive?.chromeHideDelayMs ?? PLAYER_SETTINGS_DEFAULTS.immersive.chromeHideDelayMs;
  }

  function getPlayerHighlightChannelOptions() {
    const ch = playerSettings?.highlight?.channels || {};
    const mk = (hex) => ({ visibleEdgeColor: hex, hiddenEdgeColor: hex });
    return {
      info: mk(ch.info || "#ffffff"),
      locate: mk(ch.locate || "#E6A800"),
      alarm: mk(ch.alarm || "#DC3A2F")
    };
  }

  function applyPlayerSettingsToSysConfig() {
    if (!playerSettings) return;
    sysConfig.antialias = playerSettings.render?.antialias ?? sysConfig.antialias;
    sysConfig.fps = playerSettings.render?.targetFps ?? sysConfig.fps;
    sysConfig.lowFps = playerSettings.render?.lowFpsMode ?? sysConfig.lowFps;
    sysConfig.sceneAutoRotate = playerSettings.playback?.sceneAutoRotate ?? sysConfig.sceneAutoRotate;
    sysConfig.progressFlag = playerSettings.general?.progressOverlayEnabled ?? sysConfig.progressFlag;
  }

  function applyPlayerAudioFromSettings() {
    const audio = playerSettings?.audio;
    if (!audio) return;
    playerVolume = Math.min(1, Math.max(0, (audio.defaultVolumePercent ?? 100) / 100));
    playerVolumeMuted = Boolean(audio.defaultMuted);
    syncPlayerVolumeUi();

  function applyPlayerSettingsLayout() {

    if (!layout || !rootContainer) return;
    rootContainer.classList.toggle("rightPanelOpen", layout.rightPanelOpenByDefault !== false);
    if (Number.isFinite(layout.playlistListMinHeightPx) && playlistListEl) {

  function readPlayerSettingsFieldValue(field, inputEl) {
    if (!inputEl) return undefined;
    if (field.type === "checkbox") return Boolean(inputEl.checked);
    if (field.type === "number") {
      const n = Number(inputEl.value);
      return Number.isFinite(n) ? n : undefined;
    }
    return inputEl.value;
  }

  function writePlayerSettingsFieldValue(field, inputEl, value) {
    if (!inputEl) return;
    if (field.type === "checkbox") {
      inputEl.checked = Boolean(value);
      return;
    }
    if (field.type === "number") {
      inputEl.value = value != null ? String(value) : "";
      return;
    }
    inputEl.value = value != null ? String(value) : "";
  }

  function renderPlayerSettingsModalBody() {
    if (!playerSettingsScroll || !playerSettingsNav) return;
    playerSettingsNav.innerHTML = "";
    playerSettingsScroll.innerHTML = "";
    for (const section of PLAYER_SETTINGS_SECTIONS) {
      const navBtn = document.createElement("button");
      navBtn.type = "button";
      navBtn.className = "playerSettingsNavBtn";
      navBtn.dataset.sectionId = section.id;
      navBtn.textContent = section.title;
      playerSettingsNav.appendChild(navBtn);

      const sectionEl = document.createElement("section");
      sectionEl.className = "playerSettingsSection";
      sectionEl.id = `playerSettingsSection-${section.id}`;
      sectionEl.dataset.sectionId = section.id;
      const title = document.createElement("h3");
      title.className = "playerSettingsSectionTitle";
      title.textContent = section.title;
      sectionEl.appendChild(title);

      for (const field of PLAYER_SETTINGS_FIELDS.filter((f) => f.section === section.id)) {
        const row = document.createElement("div");
        row.className =
          field.type === "checkbox" ? "playerSettingsField playerSettingsFieldCheck" : "playerSettingsField";
        const inputId = `playerSettingsField-${field.path.replace(/\./g, "-")}`;
        const label = document.createElement("label");
        label.setAttribute("for", inputId);
        let inputEl;
        if (field.type === "checkbox") {
          inputEl = document.createElement("input");
          inputEl.type = "checkbox";
          inputEl.id = inputId;
          inputEl.dataset.settingsPath = field.path;
          label.appendChild(inputEl);
          label.appendChild(document.createTextNode(field.label));
        } else if (field.type === "select") {
          label.textContent = field.label;
          inputEl = document.createElement("select");
          inputEl.id = inputId;
          inputEl.dataset.settingsPath = field.path;
          for (const opt of field.options || []) {
            const option = document.createElement("option");
            option.value = opt.value;
            option.textContent = opt.label;
            inputEl.appendChild(option);
          }
        } else {
          label.textContent = field.label;
          inputEl = document.createElement("input");
          inputEl.type = field.type === "color" ? "color" : field.type === "number" ? "number" : "text";
          inputEl.id = inputId;
          inputEl.dataset.settingsPath = field.path;
          if (field.min != null) inputEl.min = String(field.min);
          if (field.max != null) inputEl.max = String(field.max);
        }
        if (field.type !== "checkbox") {
          row.appendChild(label);
          row.appendChild(inputEl);
        } else {
          row.appendChild(label);
        }
        if (field.hint) {
          row.classList.add("playerSettingsFieldWithHint");
          const hint = document.createElement("div");
          hint.className = "playerSettingsHint";
          hint.textContent = field.hint;
          row.appendChild(hint);
        }
        sectionEl.appendChild(row);
      }
      playerSettingsScroll.appendChild(sectionEl);
    }
  }

  function populatePlayerSettingsModalForm(source) {
    for (const field of PLAYER_SETTINGS_FIELDS) {
      const inputEl = playerSettingsScroll?.querySelector(`[data-settings-path="${field.path}"]`);
      writePlayerSettingsFieldValue(field, inputEl, getPlayerSettingByPath(source, field.path));

  function readPlayerSettingsModalFormInto(target) {
    for (const field of PLAYER_SETTINGS_FIELDS) {
      const inputEl = playerSettingsScroll?.querySelector(`[data-settings-path="${field.path}"]`);
      const value = readPlayerSettingsFieldValue(field, inputEl);
      if (value !== undefined) setPlayerSettingByPath(target, field.path, value);
    }

  function bindPlayerSettingsScrollSpy() {
    playerSettingsScrollObserver?.disconnect();
    const sectionEls = playerSettingsScroll?.querySelectorAll(".playerSettingsSection");
    if (!sectionEls?.length) return;
    playerSettingsScrollObserver = new IntersectionObserver(
      (entries) => {
        const visible = entries
          .filter((e) => e.isIntersecting)
          .sort((a, b) => b.intersectionRatio - a.intersectionRatio)[0];
        if (!visible?.target?.dataset?.sectionId) return;
        const id = visible.target.dataset.sectionId;
        playerSettingsNav?.querySelectorAll(".playerSettingsNavBtn").forEach((btn) => {
          btn.classList.toggle("active", btn.dataset.sectionId === id);
        });
      },
      { root: playerSettingsScroll, rootMargin: "-20% 0px -55% 0px", threshold: [0, 0.15, 0.4, 0.7] }
    );
    sectionEls.forEach((el) => playerSettingsScrollObserver.observe(el));
  }

  function openPlaylistIdb() {
    return new Promise((resolve, reject) => {
      const req = indexedDB.open(IDB_NAME, IDB_VERSION);
      req.onerror = () => reject(req.error || new Error("IndexedDB open failed"));
      req.onsuccess = () => resolve(req.result);
      req.onupgradeneeded = () => {
        const db = req.result;
        if (!db.objectStoreNames.contains(IDB_STORE)) {
          db.createObjectStore(IDB_STORE);
        }
      };
    });
  }

  async function idbPutFileBlob(id, blob) {
    const db = await openPlaylistIdb();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(IDB_STORE, "readwrite");
      tx.oncomplete = () => {
        db.close();
        resolve();
      };
      tx.onerror = () => {
        db.close();
        reject(tx.error);
      };
      tx.objectStore(IDB_STORE).put(blob, id);
    });
  }

  async function idbGetFileBlob(id) {
    const db = await openPlaylistIdb();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(IDB_STORE, "readonly");
      tx.oncomplete = () => db.close();
      tx.onerror = () => {
        db.close();
        reject(tx.error);
      };
      const getReq = tx.objectStore(IDB_STORE).get(id);
      getReq.onsuccess = () => resolve(getReq.result ?? null);
      getReq.onerror = () => reject(getReq.error);
    });
  }

  async function idbDeleteFileBlob(id) {
    const db = await openPlaylistIdb();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(IDB_STORE, "readwrite");
      tx.oncomplete = () => {
        db.close();
        resolve();
      };
      tx.onerror = () => {
        db.close();
        reject(tx.error);
      };
      tx.objectStore(IDB_STORE).delete(id);
    });
  }

  async function idbClearAllBlobs() {
    const db = await openPlaylistIdb();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(IDB_STORE, "readwrite");
      tx.oncomplete = () => {
        db.close();
        resolve();
      };
      tx.onerror = () => {
        db.close();
        reject(tx.error);
      };
      tx.objectStore(IDB_STORE).clear();
    });
  }

  function playlistManifestEntry(entry) {
    if (!entry) {
      return null;
    }
    if (entry.kind === "url") {
      return {
        id: entry.id,
        kind: "url",
        url: entry.url,
        label: entry.label
      };
    }
    if (entry.kind === "file") {
      return {
        id: entry.id,
        kind: "file",
        label: entry.label,
        fileName: entry.file?.name || entry.label,
        fileSize: entry.file?.size,
        fileLastModified: entry.file?.lastModified
      };
    }
    return null;
  }

  function savePlaylistState() {
    try {
      const manifest = playlist.map(playlistManifestEntry).filter(Boolean);
      localStorage.setItem(LS_PLAYLIST_MANIFEST_KEY, JSON.stringify(manifest));
      const current = playlist[currentPlaylistIndex];
      if (current?.id) {
        localStorage.setItem(LS_PLAYLIST_CURRENT_ID_KEY, current.id);
      } else {
        localStorage.removeItem(LS_PLAYLIST_CURRENT_ID_KEY);
      }
    } catch (err) {
      console.warn("[ScenePlayer] savePlaylistState", err);
    }
  }

  async function restorePlaylistFromStorage() {
    let manifest;
    try {
      const raw = localStorage.getItem(LS_PLAYLIST_MANIFEST_KEY);
      if (!raw) {
        return false;
      }
      manifest = JSON.parse(raw);
      if (!Array.isArray(manifest) || !manifest.length) {
        return false;
      }
    } catch {
      return false;
    }

    playlist.length = 0;
    currentPlaylistIndex = -1;

    for (const item of manifest) {
      if (!item || typeof item !== "object" || !item.id) {
        continue;
      }
      if (item.kind === "url" && item.url) {
        playlist.push({
          id: item.id,
          kind: "url",
          url: item.url,
          label: item.label || fileNameFromUrl(item.url)
        });
        continue;
      }
      if (item.kind === "file") {
        const blob = await idbGetFileBlob(item.id);
        if (!blob) {
          continue;
        }
        const file = new File([blob], item.fileName || item.label || "scene.json", {
          type: "application/json",
          lastModified: item.fileLastModified || Date.now()
        });
        playlist.push({
          id: item.id,
          kind: "file",
          file,
          label: item.label || file.name
        });
      }
    }

    if (!playlist.length) {

  function fileNameFromUrl(url) {
    try {
      const u = new URL(url, window.location.href);
      const seg = u.pathname.split("/").filter(Boolean);
      return seg.length ? seg[seg.length - 1] : url;
    } catch {
      const cleaned = String(url).split("?")[0];
      const seg = cleaned.split(/[/\\]/).filter(Boolean);
      return seg.length ? seg[seg.length - 1] : cleaned;
    }
  }

  function syncPlaylistContextSubmenuFlip() {

    const submenu = item?.querySelector(".playlistContextSubmenu");
    if (!item || !submenu || !playlistContextMenu?.classList.contains("visible")) {
      return;
    }
    const gap = 4;
    const prevDisplay = submenu.style.display;
    const prevVisibility = submenu.style.visibility;
    const prevPointerEvents = submenu.style.pointerEvents;
    submenu.style.visibility = "hidden";
    submenu.style.display = "block";
    submenu.style.pointerEvents = "none";
    const submenuWidth = submenu.offsetWidth + 8;
    submenu.style.display = prevDisplay;
    submenu.style.visibility = prevVisibility;
    submenu.style.pointerEvents = prevPointerEvents;

    const itemRect = item.getBoundingClientRect();
    const needsFlip = itemRect.right + submenuWidth + gap > window.innerWidth;
    item.classList.toggle("submenuFlipLeft", needsFlip);
    updatePlaylistContextSubmenuArrow(item);

    playlistContextMenu.style.top = "0px";
    const menuRect = playlistContextMenu.getBoundingClientRect();
    const maxLeft = Math.max(8, window.innerWidth - menuRect.width - 8);
    const maxTop = Math.max(8, window.innerHeight - menuRect.height - 8);
    const left = Math.min(Math.max(8, clientX), maxLeft);
    const top = Math.min(Math.max(8, clientY), maxTop);
    playlistContextMenu.style.left = `${left}px`;
    playlistContextMenu.style.top = `${top}px`;
    requestAnimationFrame(() => {
      syncPlaylistContextSubmenuFlip();
      requestAnimationFrame(syncPlaylistContextSubmenuFlip);
    });
  }

  async function removePlaylistEntryAt(index) {
    if (index < 0 || index >= playlist.length) {
      return;
    }
    const entry = playlist[index];
    const label = entry.label || `条目 ${index + 1}`;
    const wasCurrent = index === currentPlaylistIndex;
    playlist.splice(index, 1);
    if (entry.kind === "file" && entry.id) {
      try {
        await idbDeleteFileBlob(entry.id);
      } catch (err) {
        console.warn("[ScenePlayer] idbDeleteFileBlob", err);
      }
    }
    if (!playlist.length) {
      currentPlaylistIndex = -1;
      renderPlaylistUi();
      savePlaylistState();
      if (wasCurrent) {
        stopPlayerAndClearScene();
      }
      showMessage(`已从播放列表移除「${label}」。`, "info");
      return;
    }
    if (currentPlaylistIndex > index) {
      currentPlaylistIndex -= 1;
    }
    renderPlaylistUi();
    savePlaylistState();
    if (wasCurrent) {
      const nextIdx = Math.min(index, playlist.length - 1);
      playbackRenderPaused = false;
      await activatePlaylistIndex(nextIdx);
    }
    showMessage(`已从播放列表移除「${label}」。`, "info");
  }

  function isTjzSceneFileName(name = "") {
    return /\.tjz$/i.test(String(name || "").trim());
  }

  function isJsonSceneFileName(name = "") {
    return /\.(json|threejson|tjson)$/i.test(String(name || "").trim());
  }

  function isSupportedSceneFileName(name = "") {
    return isTjzSceneFileName(name) || isJsonSceneFileName(name);
  }

  async function appendFilesToPlaylistOnly(files) {
    const sceneFiles = files.filter((f) => isSupportedSceneFileName(f.name));
    if (!sceneFiles.length) {
      showMessage("未找到可添加的 JSON 或 .tjz 场景文件。", "warning");
      return 0;
    }
    sceneFiles.sort((a, b) => {
      const pa = a.webkitRelativePath || a.name;
      const pb = b.webkitRelativePath || b.name;
      return pa.localeCompare(pb, undefined, { sensitivity: "base" });
    });
    for (const f of sceneFiles) {
      await appendFileToPlaylist(f);
    }
    showMessage(`已添加 ${sceneFiles.length} 个场景到播放列表。`, "success");
    return sceneFiles.length;
  }

  function hasAnySceneLight(rootScene) {

    let hit = false;
    rootScene.traverse((obj) => {
      if (hit) {
        return;
      }
      if (obj?.isLight === true) {
        hit = true;
      }
    });
    return hit;
  }

  async function applyTjzArchiveToPlayer(bytes, hintLabel = "") {
    const inspection = await inspectJsonSceneArchiveEntry(bytes);
    const entryKind = inspection?.entryKind || "unknown";
    teardownPlayerScene();
    const loadedRuntime = await createJsonSceneFromArchive(bytes, {
      canvas: canvasContainer,
      autoFillLights: true,
      autoFillCamera: true,
      sceneAutoRotate: sysConfig.sceneAutoRotate,
      missingAssetPolicy: "warn",
      onWarning: (msg) => console.warn("[tjz-load]", msg),
      async onRuntimeReady(ctx) {
        assignPlayerSceneRuntime(ctx?.runtime);
        windowResize();
        if (playerSettings?.render?.earlyRenderWhileLoading !== false) {
          startPlayerRenderLoopEarly();
        }
      },
      async onSceneReady(ctx) {
        try {
          const { bootstrapFirstPersonExtensionsFromScene } = await import(
            "./extensions/fps-walk/bootstrapFirstPersonExtensions.js"
          );
          await bootstrapFirstPersonExtensionsFromScene(ctx);
        } catch (err) {
          console.warn("[ScenePlayer] firstPerson extensions bootstrap skipped", err);
        }
      }
    });
    assignPlayerSceneRuntime(loadedRuntime);
    const normalized = loadedRuntime?.normalizedPayload;
    if (normalized && typeof normalized === "object") {
      sysConfig.jsonData = normalized;
      applyJsonToSysConfigLists();
      loadedSceneJsonText = JSON.stringify(normalized, null, 2);
    } else {
      sysConfig.jsonData = null;
      loadedSceneJsonText = "";
    }
    markPlayerSceneLoaded();
    trackDisposableResource(scene);
    windowResize();
    bindThreeJsonSceneAudioUnlock(canvasContainer, () => sceneRuntime);
    applyPlayerMasterVolume();
    void resumeThreeJsonAudioContextFromCamera(camera);
    if (sceneRuntime) {
      setThreeJsonSceneAudioPaused(sceneRuntime, playerVolumeMuted);
    }
    initEventListener();
    initHighLight();
    superAnimate();
    finishSceneLoad();
    updatePlayerTopBarSceneTitle(hintLabel);
  }

  async function handleOpenSceneFile(file, { activate = false } = {}) {
    if (!file) {
      return;
    }
    if (!isSupportedSceneFileName(file.name)) {
      showMessage("请选择 JSON 或 .tjz 场景文件。", "warning");
      return;
    }
    if (activate) {
      playbackRenderPaused = false;
    }
    const idx = await appendFileToPlaylist(file);
    if (activate) {
      await activatePlaylistIndex(idx);
      return;
    }

  async function applyParsedSceneToPlayer(data) {
    const payload = resolveScenePayloadForLoad(data);
    if (!validateLoadedScenePayload(payload)) {
      throw new Error("JSON 格式无效（需要 worldInfo 或标准 objectList）");
    }
    ensureThreeJsonIdsOnScenePayload(payload);
    loadedSceneJsonText = JSON.stringify(payload, null, 2);
    teardownPlayerScene();
    sysConfig.jsonData = payload;
    applyJsonToSysConfigLists();
    await initWorld();
    updatePlayerTopBarSceneTitle();

  async function applyPreviewPayloadFromEditor(payload, options = {}) {
    previewBindSceneEventsOverride = options.bindSceneEvents;
    try {
      await applyParsedSceneToPlayer(payload);

      previewBindSceneEventsOverride = undefined;
    }

  const SCENE_PREVIEW_CHANNEL = "threejson:scene-preview";
  const SCENE_PREVIEW_VERSION = 1;

  function isEditorPreviewUrl() {
    return new URLSearchParams(window.location.search).get("editorPreview") === "1";
  }

  function isScenePreviewMessageEvent(event) {
    if (!event || typeof event.data !== "object" || event.data === null) {
      return false;
    }
    if (event.origin && event.origin !== window.location.origin) {
      return false;
    }
    return event.data.channel === SCENE_PREVIEW_CHANNEL && event.data.version === SCENE_PREVIEW_VERSION;
  }

  function postScenePreviewMessage(target, message) {
    if (!target || target.closed) {
      return false;
    }
    target.postMessage(
      { channel: SCENE_PREVIEW_CHANNEL, version: SCENE_PREVIEW_VERSION, ...message },
      window.location.origin
    );
    return true;
  }

  let editorPreviewLoadGeneration = 0;

  function notifyEditorPreviewReady() {
    if (!window.opener || window.opener.closed) {
      return;
    }
    postScenePreviewMessage(window.opener, { action: "ready" });
  }

  function notifyEditorPreviewLoaded(ok, errorMessage = "") {
    if (!window.opener || window.opener.closed) {
      return;
    }
    postScenePreviewMessage(window.opener, {
      action: "loaded",
      ok: Boolean(ok),
      error: errorMessage || undefined
    });
  }

  function installEditorPreviewMessageListener() {
    window.addEventListener("message", (event) => {
      if (!isScenePreviewMessageEvent(event)) {
        return;
      }
      if (window.opener && event.source !== window.opener) {
        return;
      }
      if (event.data?.action !== "load") {
        return;
      }
      void (async () => {
        const gen = ++editorPreviewLoadGeneration;
        setCanvasIdleOverlayVisible(false);
        setLoading(true);
        setLoadingMessage("正在加载编辑器预览场景...");
        try {
          const payload = event.data.payload;
          if (!payload || typeof payload !== "object") {
            throw new Error("预览消息缺少有效 payload。");
          }
          await applyPreviewPayloadFromEditor(payload, {
            bindSceneEvents: event.data.bindSceneEvents,
            label: event.data.label
          });
          if (gen !== editorPreviewLoadGeneration) {
            return;
          }
          notifyEditorPreviewLoaded(true);
          showMessage("已加载编辑器预览场景。", "success");
        } catch (error) {
          if (gen !== editorPreviewLoadGeneration) {
            return;
          }
          const message = String(error.message || error);
          notifyEditorPreviewLoaded(false, message);
          showMessage(message, "error");
          console.warn("[scene-player preview]", error);
        } finally {
          if (gen === editorPreviewLoadGeneration) {
            setLoading(false);
          }
        }
      })();
    });
  }

  function bootstrapEditorPreviewFromOpener() {
    if (!isEditorPreviewUrl()) {
      return false;
    }
    installEditorPreviewMessageListener();
    setLoadingMessage("等待编辑器推送场景…");
    setLoading(true);
    window.setTimeout(notifyEditorPreviewReady, 0);
    window.setTimeout(notifyEditorPreviewReady, 250);
    return true;
  }

  async function activatePlaylistIndex(index) {
    if (sceneSwitchLocked || index < 0 || index >= playlist.length) {
      return;
    }
    sceneSwitchLocked = true;
    currentPlaylistIndex = index;
    renderPlaylistUi();
    savePlaylistState();
    setCanvasIdleOverlayVisible(false);
    const entry = playlist[index];
    try {
      setLoadingMessage("正在读取场景...");
      openOrCloseProgressManager(sysConfig.progressFlag);
      if (entry.kind === "url" && entry.url) {
        const entryUrl = resolvePlayerPageUrl(entry.url);
        if (isTjzSceneFileName(entryUrl)) {
          const response = await fetch(entryUrl);
          if (!response.ok) {
            throw new Error(`加载场景失败：${response.status}`);
          }
          const bytes = new Uint8Array(await response.arrayBuffer());
          await applyTjzArchiveToPlayer(bytes, entry.label || fileNameFromUrl(entryUrl));
        } else {
          const response = await fetch(entryUrl);
          if (!response.ok) {
            throw new Error(`加载场景失败：${response.status}`);
          }
          const rawText = await response.text();
          const data = JSON.parse(rawText);
          await applyParsedSceneToPlayer(data);
        }
      } else if (entry.kind === "file" && entry.file) {
        if (isTjzSceneFileName(entry.file.name)) {
          const bytes = new Uint8Array(await entry.file.arrayBuffer());
          await applyTjzArchiveToPlayer(bytes, entry.file.name);
        } else {
          const rawText = await entry.file.text();
          const data = JSON.parse(rawText);
          const wasNative = isThreeJsObjectExportJson(data);
          await applyParsedSceneToPlayer(data);
          if (wasNative) {
            showMessage(
              `已识别为 Three.js 原生 JSON 并载入 ${entry.file.name}（与「加载原生 JSON」等效）`,
              "info"
            );
          }
        }
      } else {
        throw new Error("播放列表条目无效");
      }
    } catch (err) {
      setLoading(false);
      openOrCloseProgressManager(false);
      showMessage(`加载场景失败：${err.message}`, "error");
      console.error(err);
      if (!renderLoop) {
        setCanvasIdleOverlayVisible(true);
      }
    } finally {
      sceneSwitchLocked = false;
      syncTransportBar();
    }
  }

  async function handleLoadNativeThreeJsonPlayerFile(file) {
    if (!file || sceneSwitchLocked) {
      return;
    }
    sceneSwitchLocked = true;
    setCanvasIdleOverlayVisible(false);
    try {
      setLoadingMessage("正在读取原生 Three JSON...");
      openOrCloseProgressManager(sysConfig.progressFlag);
      const text = await file.text();
      const parsed = JSON.parse(text);
      const wrapped = buildMinimalWorldJsonForNativeThreeInline(parsed, { label: file.name });
      await applyParsedSceneToPlayer(wrapped);
      showMessage(`已按原生 JSON 载入 ${file.name}`, "success");
    } catch (err) {
      setLoading(false);
      openOrCloseProgressManager(false);
      showMessage(`加载原生 JSON 失败：${err.message}`, "error");
      console.error(err);
      if (!renderLoop) {
        setCanvasIdleOverlayVisible(true);
      }
    } finally {
      sceneSwitchLocked = false;
      syncTransportBar();
    }
  }

  function validateLoadedScenePayload(data) {
    return isLoadableScenePayload(data);

  function mergeSceneHelpersFromSysConfig(existingHelpers, sysConfig) {
    const out =
      existingHelpers && typeof existingHelpers === "object"
        ? JSON.parse(JSON.stringify(existingHelpers))
        : {};
    if (!out.grid || typeof out.grid !== "object") {
      if (sysConfig.gridShow === true) {
        out.grid = { visible: true };
      }
    } else if (!hasValue(out.grid.visible) && sysConfig.gridShow === true) {
      out.grid.visible = true;
    }
    if (!out.axes || typeof out.axes !== "object") {
      if (sysConfig.axesShow === true) {
        out.axes = { visible: true };
      }
    } else if (!hasValue(out.axes.visible) && sysConfig.axesShow === true) {
      out.axes.visible = true;
    }
    return Object.keys(out).length > 0 ? out : null;
  }

  function buildPlayerRuntimeConfig(baseSceneConfig = {}) {
    const existing = baseSceneConfig && typeof baseSceneConfig === "object" ? baseSceneConfig : {};
    const cameraConfig = existing.camera && typeof existing.camera === "object" ? existing.camera : {};
    const rendererConfig = existing.renderer && typeof existing.renderer === "object" ? existing.renderer : {};
    const controlsConfig = existing.controls && typeof existing.controls === "object" ? existing.controls : {};
    const renderLoopConfig = existing.renderLoop && typeof existing.renderLoop === "object" ? existing.renderLoop : {};
    const sceneHints = existing.scene && typeof existing.scene === "object" ? existing.scene : {};
    const cameraBlock = {
      fov: valueOr(cameraConfig.fov, 50),
      near: valueOr(cameraConfig.near, 0.15),
      far: valueOr(cameraConfig.far, 3500)
    };
    if (cameraConfig.position) {
      cameraBlock.position = cameraConfig.position;
    }

    return {
      ...existing,
      canvasWidth: valueOr(existing.canvasWidth, sysConfig.canvasWidth),
      canvasHeight: valueOr(existing.canvasHeight, sysConfig.canvasHeight),
      scene: { ...sceneHints },
      camera: cameraBlock,
      renderer: {
        antialias: valueOr(rendererConfig.antialias, sysConfig.antialias),
        ratioRate: valueOr(rendererConfig.ratioRate, sysConfig.ratioRate),
        precision: valueOr(rendererConfig.precision, "highp"),
        preserveDrawingBuffer: valueOr(rendererConfig.preserveDrawingBuffer, true),
        stencil: valueOr(rendererConfig.stencil, true),
        alpha: valueOr(rendererConfig.alpha, true),
        shadowMapEnabled: valueOr(rendererConfig.shadowMapEnabled, true),
        clearAlpha: valueOr(rendererConfig.clearAlpha, 0.1)
      },
      controls: (() => {
        const typeRaw = controlsConfig.type || "";
        if (String(typeRaw).toLowerCase() === "firstperson") {
          return {
            ...controlsConfig,
            type: "firstPerson",
            moveSpeed: valueOr(controlsConfig.moveSpeed, 5),
            eyeHeight: valueOr(controlsConfig.eyeHeight, 1.6),
            lookSensitivity: valueOr(controlsConfig.lookSensitivity, 0.001),
            pointerLock: controlsConfig.pointerLock !== false,
            floorSnap: controlsConfig.floorSnap !== false
          };
        }
        return {
          ...controlsConfig,
          listenToKeyEvents: valueOr(controlsConfig.listenToKeyEvents, true),
          enableDamping: valueOr(controlsConfig.enableDamping, true),
          dampingFactor: valueOr(controlsConfig.dampingFactor, 0.35),
          enableZoom: valueOr(controlsConfig.enableZoom, true),
          autoRotate: valueOr(controlsConfig.autoRotate, sysConfig.sceneAutoRotate),
          minDistance: valueOr(controlsConfig.minDistance, 5),
          maxDistance: valueOr(controlsConfig.maxDistance, 2600),
          maxPolarAngle: valueOr(controlsConfig.maxPolarAngle, Math.PI / 1.9),
          enablePan: valueOr(controlsConfig.enablePan, true),
          target: controlsConfig.target
        };
      })(),
      renderLoop: (() => {
        const fpsPolicy = resolveRenderLoopFpsPolicy(renderLoopConfig, {
          fps: sysConfig.fps,
          lowFps: sysConfig.lowFps,
          overrideSceneRenderLoop: playerSettings?.render?.overrideSceneRenderLoop === true
        });
        const loop = {
          autoResize: valueOr(renderLoopConfig.autoResize, sysConfig.autoResize),
          firstAutoResize: valueOr(renderLoopConfig.firstAutoResize, sysConfig.firstAutoResize),
          fps: fpsPolicy.fps,
          lowFps: fpsPolicy.lowFps
        };
        const renderMode = valueOr(renderLoopConfig.renderMode, sysConfig.renderMode);
        if (hasValue(renderMode)) {
          loop.renderMode = renderMode;
        }
        return loop;
      })(),
      ...(function () {
        const mergedHelpers = mergeSceneHelpersFromSysConfig(existing.helpers, sysConfig);
        return mergedHelpers ? { helpers: mergedHelpers } : {};
      })()
    };
  }

  function buildPlayerScenePayload() {
    const payload = JSON.parse(JSON.stringify(sysConfig.jsonData || {}));
    // 标准 JSON（仅 objectList）：直接交给 createJsonScene 归一化，避免注入 sceneConfig 破坏 canonical 判定
    if (isCanonicalScenePayload(payload)) {
      return payload;
    }
    payload.sceneConfig = buildPlayerRuntimeConfig(payload.sceneConfig);
    return payload;
  }

  function fitViewToSceneBounds() {
    if (!camera || !controls || !scene) {
      return false;
    }
    const bounds = buildAdaptiveContentBoundingBoxTHREE(scene, { ignoreHelper: null });
    if (!bounds) {
      return false;
    }
    return fitPerspectiveCameraToContentBoundsTHREE(camera, controls, bounds, {
      aspectHints: {
        rendererDomElement: renderer?.domElement,
        threeViewActive: false,
        mainViewRect: {
          x: 0,
          y: 0,
          width: sysConfig.canvasWidth,
          height: sysConfig.canvasHeight
        },
        canvasWrap: canvasWrap || rootContainer
      }
    });
  }

  function scheduleSceneFitPasses() {
    fitViewToSceneBounds();
    window.requestAnimationFrame(() => {

      return;

    const ok = fitPerspectiveCameraToContentBoundsTHREE(camera, controls, bounds, {

        threeViewActive: false,
        mainViewRect: {
          x: 0,
          y: 0,
          width: sysConfig.canvasWidth,

      }
      const rel = event.relatedTarget;
      if (rel && topBarEl?.contains(rel)) {
        return;
      }
      if (
        rel &&
        immersiveTopEdgeStrip &&
        (rel === immersiveTopEdgeStrip || immersiveTopEdgeStrip.contains(rel))
      ) {
        return;
      }
      scheduleHideImmersiveTopBar();
    });

    bottomBarEl?.addEventListener("pointerenter", () => {
      if (rootContainer.classList.contains("immersiveFullscreen")) {
        showImmersiveBottomBar();
      }
    });
    bottomBarEl?.addEventListener("pointerleave", (event) => {
      if (!rootContainer.classList.contains("immersiveFullscreen")) {
        return;
      }
      const rel = event.relatedTarget;
      if (rel && bottomBarEl?.contains(rel)) {
        return;
      }
      if (
        rel &&
        immersiveBottomEdgeStrip &&
        (rel === immersiveBottomEdgeStrip || immersiveBottomEdgeStrip.contains(rel))
      ) {
        return;
      }
      scheduleHideImmersiveBottomBar();
    });

    immersiveRightEdgeStrip?.addEventListener("pointerenter", showImmersiveDock);
    immersiveRightEdgeStrip?.addEventListener("pointermove", showImmersiveDock);
    rightDockDom?.addEventListener("pointerenter", () => {
      if (rootContainer.classList.contains("immersiveFullscreen")) {
        if (immersiveDockHideTimer) {
          window.clearTimeout(immersiveDockHideTimer);
          immersiveDockHideTimer = null;
        }
      }
    });
    rightDockDom?.addEventListener("pointerleave", () => {
      scheduleHideImmersiveDock();
    });

    document.getElementById("playlistAddJsonFileBtn")?.addEventListener("click", () => {
      playlistAddSingleFileInput?.click();
      closePlaylistAddMenu();
    });
    document.getElementById("playlistAddTjzFileBtn")?.addEventListener("click", () => {
      playlistAddTjzFileInput?.click();
      closePlaylistAddMenu();
    });
    document.getElementById("playlistAddFolderBtn")?.addEventListener("click", () => {
      playlistFolderInput?.click();
      closePlaylistAddMenu();
    });
    playlistAddSingleFileInput?.addEventListener("change", async (e) => {
      const file = e.target.files?.[0];
      e.target.value = "";
      if (!file) {
        return;
      }
      if (!isJsonSceneFileName(file.name)) {
        showMessage("请选择 JSON 场景文件。", "warning");
        return;
      }
      await handleOpenSceneFile(file, { activate: false });
    });
    playlistAddTjzFileInput?.addEventListener("change", async (e) => {
      const file = e.target.files?.[0];
      e.target.value = "";
      if (!file) {
        return;
      }
      if (!isTjzSceneFileName(file.name)) {
        showMessage("请选择 .tjz 场景包。", "warning");
        return;
      }
      await handleOpenSceneFile(file, { activate: false });
    });
    playlistFolderInput?.addEventListener("change", async (e) => {
      const files = Array.from(e.target.files || []);
      e.target.value = "";
      await appendFilesToPlaylistOnly(files);
    });
    playlistClearBtn?.addEventListener("click", () => {
      void clearPlaylistAndStop();
    });
    document.getElementById("playlistContextCopyItem")?.addEventListener("pointerenter", () => {
      syncPlaylistContextSubmenuFlip();
    });
    playlistContextPlayBtn?.addEventListener("click", () => {
      void playPlaylistContextTarget();
      closePlaylistContextMenu();
    });
    playlistContextReloadBtn?.addEventListener("click", () => {
      void reloadPlaylistContextTarget();
      closePlaylistContextMenu();
    });
    playlistContextCopyPathBtn?.addEventListener("click", () => {
      void copyPlaylistContextPath();
      closePlaylistContextMenu();
    });
    playlistContextCopyNameBtn?.addEventListener("click", () => {
      void copyPlaylistContextName();
      closePlaylistContextMenu();
    });
    playlistContextRemoveBtn?.addEventListener("click", () => {
      void removePlaylistContextTarget();
      closePlaylistContextMenu();
    });
    playlistContextMenu?.addEventListener("contextmenu", (event) => {
      event.preventDefault();
      event.stopPropagation();
    });
    document.addEventListener("click", (event) => {
      if (!playlistContextMenu?.classList.contains("visible")) {
        return;
      }
      if (playlistContextMenu.contains(event.target)) {
        return;
      }
      closePlaylistContextMenu();
    });
    document.addEventListener("contextmenu", (event) => {
      if (!playlistContextMenu?.classList.contains("visible")) {
        return;
      }
      const target = event.target;
      if (playlistContextMenu.contains(target)) {
        return;
      }
      if (target?.closest?.(".playlistRow")) {
        return;
      }
      closePlaylistContextMenu();
    });
    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape") {
        closePlaylistContextMenu();
      }
    });
    window.addEventListener("resize", closePlaylistContextMenu);
    playlistListEl?.addEventListener("scroll", closePlaylistContextMenu, { passive: true });
  }

  window.addEventListener("DOMContentLoaded", async () => {
    await loadPlayerSettings();
    applyPlayerSettings({ initial: true });
    initPlayerSettingsModal();
    loadPlayerVolumePrefs();
    playerVolumeMuteBtn?.addEventListener("click", () => {
      togglePlayerVolumeMute();
    });
    playerVolumeSlider?.addEventListener("input", onPlayerVolumeSliderInput);
    initPlayerChrome();
    bindProgressElement(loadingMask);
    openOrCloseProgressManager(false);
    const editorPreviewActive = bootstrapEditorPreviewFromOpener();
    const restored =
      !editorPreviewActive &&
      playerSettings?.playback?.restorePlaylistOnStartup !== false
        ? await restorePlaylistFromStorage()
        : false;
    if (!restored && !editorPreviewActive) {
      const queryUrl = resolveUrlQuerySceneUrl();
      if (queryUrl) {
        playlist.length = 0;
        currentPlaylistIndex = -1;
        appendUrlToPlaylist(queryUrl);
        await activatePlaylistIndex(0);
      } else {
        showPlayerStartupEmptyState();
      }
    }
  });

  window.addEventListener("beforeunload", wasteCleaner);

  async function initWorld() {
    setLoadingMessage("正在加载场景 JSON...");
    await initSceneRuntime();
    initEventListener();
    initHighLight();
    superAnimate();
    finishSceneLoad();
  }

  function finishSceneLoad() {
    setLoadingMessage("3D 场景加载完成。");
    const doneDelayMs = getSceneLoadDoneDelayMs();
    if (doneDelayMs > 0) {
      window.setTimeout(() => setLoading(false), doneDelayMs);
    } else {
      setLoading(false);
    }
    openOrCloseProgressManager(false);
    scheduleSceneFitPasses();
    syncTransportBar();
  }

  function initEventListener() {
    unbindPlayerEventListeners();
    window.addEventListener("resize", windowResize);
    detachHostedContainerDoorDblclick = attachHostedContainerDoorDblclick({
      getScene: () => scene,
      getCamera: () => camera,
      getCanvas: () => renderer?.domElement ?? canvasContainer
    });
    document.addEventListener("dblclick", mouseDbClickHandler);
    canvasContainer.addEventListener("contextmenu", rightClickHandler);
    keyDownHandler();
    playerEventsBound = true;
  }

  async function initSceneRuntime() {
    const renderLoopUserPolicy = {
      fps: sysConfig.fps,
      lowFps: sysConfig.lowFps,
      overrideSceneRenderLoop: playerSettings?.render?.overrideSceneRenderLoop === true
    };
    sceneRuntime = await createJsonScene(buildPlayerScenePayload(), {
      canvas: canvasContainer,
      assetsBase: "./assets",
      autoFillLights: true,
      autoFillCamera: true,
      sceneAutoRotate: sysConfig.sceneAutoRotate,
      renderLoopUserPolicy,
      ...(previewBindSceneEventsOverride !== undefined
        ? { bindSceneEvents: previewBindSceneEventsOverride }
        : {}),
      async onRuntimeReady(ctx) {
        assignPlayerSceneRuntime(ctx?.runtime);
        windowResize();
        if (playerSettings?.render?.earlyRenderWhileLoading !== false) {
          startPlayerRenderLoopEarly();
        }
      },
      async onSceneReady(ctx) {
        try {
          const { bootstrapFirstPersonExtensionsFromScene } = await import(
            "./extensions/fps-walk/bootstrapFirstPersonExtensions.js"
          );
          await bootstrapFirstPersonExtensionsFromScene(ctx);
        } catch (err) {
          console.warn("[ScenePlayer] firstPerson extensions bootstrap skipped", err);
        }
      }
    });
    assignPlayerSceneRuntime(sceneRuntime);
    markPlayerSceneLoaded();
    trackDisposableResource(scene);
    windowResize();
    bindThreeJsonSceneAudioUnlock(canvasContainer, () => sceneRuntime);
    applyPlayerMasterVolume();
    void resumeThreeJsonAudioContextFromCamera(camera);
    if (sceneRuntime) {
      setThreeJsonSceneAudioPaused(sceneRuntime, playerVolumeMuted);
    }
  }

  function superAnimate() {
    if (!renderLoop) {
      return;
    }
    renderLoop.setComposer(composer);
    if (playbackRenderPaused) {
      renderLoop.stop();
    } else {
      renderLoop.start();
    }
    syncTransportBar();
  }

  function initHighLight() {
    composer = new EffectComposer(renderer);
    trackDisposableResource(composer);
    highlightPageSetup = sceneHighlight.createPageHighlightSetup(scene, camera, {
      composer,
      renderer,
      channelOptions: getPlayerHighlightChannelOptions()
    });
    selectionVisual = highlightPageSetup.controller;
    renderScene = highlightPageSetup.renderPass;
    outlinePass = highlightPageSetup.infoPass;
    warnningPass = highlightPageSetup.locatePass;
    alarmPass = highlightPageSetup.alarmPass;
    sysConfig.initFlags.highLightInitFlag = true;
  }

  function rightClickHandler(event) {
    event.preventDefault();
    sysConfig.rightClickedFlag = true;
  }

  function windowResize() {
    const myWidth = Math.max(
      80,
      canvasWrap?.clientWidth || canvasContainer.clientWidth || window.innerWidth
    );
    const myHeight = Math.max(
      80,
      canvasWrap?.clientHeight || canvasContainer.clientHeight || window.innerHeight
    );
    sysConfig.windowSizeNow.width = myWidth;
    sysConfig.windowSizeNow.height = myHeight;
    sysConfig.canvasWidth = myWidth;
    sysConfig.canvasHeight = myHeight;
    renderLoop?.resize({
      width: sysConfig.canvasWidth,
      height: sysConfig.canvasHeight
    });
  }

  function keyDownHandler() {
    keyDownHandlerFn = (event) => {
      if (event.key === "Escape" && document.fullscreenElement) {
        document.exitFullscreen();
      }
    };
    document.addEventListener("keydown", keyDownHandlerFn);
  }

  function mouseClickObj(event) {
    event.preventDefault();
    const rect = canvasContainer.getBoundingClientRect();
    const nx = rect.width > 0 ? (event.clientX - rect.left) / rect.width : 0.5;
    const ny = rect.height > 0 ? (event.clientY - rect.top) / rect.height : 0.5;
    const vector = new THREE.Vector3(nx * 2 - 1, -(ny * 2) + 1, 0.5);
    vector.unproject(camera);
    const raycaster = new THREE.Raycaster(camera.position, vector.sub(camera.position).normalize());
    raycaster.camera = camera;
    const intersects = raycaster.intersectObjects(scene.children, true);
    return intersects.length > 0 ? intersects[0].object : null;
  }

  function mouseDbClickHandler(event) {
    if (!sysConfig.clickHighLightFlag) {
      return;
    }
    const currObj = mouseClickObj(event);
    if (currObj) {
      objHighlight(currObj);
    }
  }

  function objHighlight(obj) {
    selectionVisual?.setInfoHighlight?.(obj);
  }

  function highlightModel(model, lightType) {
    if (model) {
      highlightModelList([model], lightType);
    }
  }

  function highlightModelList(modelList, lightType = "info") {
    if (!modelList?.length || !selectionVisual) {
      return;
    }
    if (lightType === "warn") {
      selectionVisual.addLocateObjects(modelList);
    } else if (lightType === "alarm") {
      selectionVisual.addAlarmObjects(modelList);
    } else if (outlinePass) {
      outlinePass.selectedObjects = modelList.slice();
      selectionVisual.syncPassActivity();
    }
  }

  function wasteCleaner() {
    teardownPlayerScene();
  }

  window.scenePlayer = {
    scene: () => scene,
    camera: () => camera,
    renderer: () => renderer,
    controls: () => controls,
    sysConfig,
    wasteCleaner,
    fitViewToSceneBounds,
    openSceneJsonModal,
    activatePlaylistIndex,
    getPlaylist: () => playlist,
    appendUrlToPlaylist,
    appendFileToPlaylist
  };

  window.roomshow = window.scenePlayer;
</script>
</body>
</html>

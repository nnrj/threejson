name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install
        run: npm ci

      - name: Verify builtin domain manifest
        run: |
          npm run generate:business-domain-manifest
          git diff --exit-code -- builtins/builtinDomainManifest.generated.js

      - name: Test
        run: npm test

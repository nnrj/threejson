<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ThreeJSON Tutorial · Track 0 · 资源回收（默认自动 + 可选手动）</title>
  <link rel="icon" href="/assets/img/threejson.ico" type="image/x-icon">
  <script type="importmap">
    {
      "imports": {
        "threejson": "/builtins/full.js",
        "threejson/core": "/core/index.js",
        "three": "https://esm.sh/three@0.184.0",
        "three/examples/jsm/": "https://esm.sh/three@0.184.0/examples/jsm/",
        "@tweenjs/tween.js": "https://esm.sh/@tweenjs/tween.js@25.0.0",
        "html2canvas-pro": "https://esm.sh/html2canvas-pro@2.0.4",
        "gifuct-js": "https://esm.sh/gifuct-js@2.1.2",
        "three-mesh-bvh": "https://esm.sh/three-mesh-bvh@0.9.10?deps=three@0.184.0",
        "three-bvh-csg": "https://esm.sh/three-bvh-csg@0.0.18?deps=three@0.184.0,three-mesh-bvh@0.9.10"
      }
    }
  </script>
  <style>
    html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; background: #20252e; font-family: Arial, "Microsoft YaHei", sans-serif; }
    #root { position: relative; width: 100vw; height: 100vh; }
    #canvas { width: 100%; height: 100%; display: block; }
    #panel { position: absolute; left: 12px; top: 12px; z-index: 20; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; padding: 10px; border-radius: 6px; background: rgba(0, 0, 0, 0.45); color: #f2f2f2; font-size: 12px; line-height: 1.45; }
    button { cursor: pointer; border: 0; border-radius: 4px; padding: 6px 10px; background: #2f7cf8; color: #fff; }
    button.secondary { background: #3d4858; }
    #status { opacity: 0.9; }
    #hint {
      position: absolute; left: 12px; bottom: 12px; z-index: 25; max-width: min(840px, 92vw);
      padding: 8px 10px; border-radius: 4px; background: rgba(10, 10, 10, 0.72); color: #e0e0e0; font-size: 12px; line-height: 1.5;
    }
    #hint code { font-size: 11px; }
  </style>
</head>
<body>
<div id="root">
  <canvas id="canvas">需要 WebGL</canvas>
  <div id="panel">
    <button id="btnDelete">按 threeJsonId 删除 cube-main</button>
    <button id="btnDisposeRuntime" class="secondary">销毁 runtime</button>
    <span id="status">加载中...</span>
  </div>
  <div id="hint">
    【Track 0 · 资源回收】场景 JSON 内联在本页（无外部 tutorial JSON）。<br>
    ① 默认：<code>createJsonScene</code> + <code>runtime.dispose()</code> 即可正常运行与整页卸载回收 ② 可选手动：<code>disposeByThreeJsonId(scene, "cube-main")</code> 按 <code>threeJsonId</code> 删除单对象 ③ 顶栏按钮可演示上述两种路径。
  </div>
</div>
<script type="module">
  import { createJsonScene, disposeByThreeJsonId } from "threejson/core";

  const canvas = document.getElementById("canvas");
  const status = document.getElementById("status");
  const btnDelete = document.getElementById("btnDelete");
  const btnDisposeRuntime = document.getElementById("btnDisposeRuntime");
  let runtime = null;

  const sceneJson = {
    sceneConfig: {
      scene: { background: "#111820" },
      camera: { position: { x: 45, y: 40, z: 60 }, fov: 55, near: 0.1, far: 2000 },
      controls: { type: "orbit" },
      lights: [
        { type: "ambient", color: "#ffffff", intensity: 0.6 },
        { type: "directional", color: "#ffffff", intensity: 0.8, position: { x: 35, y: 50, z: 20 } }
      ]
    },
    worldInfo: {
      boxModelList: [
        {
          objType: "box",
          name: "main-cube",
          threeJsonId: "cube-main",
          position: { x: 0, y: 8, z: 0 },
          geometry: { width: 16, height: 16, depth: 16 },
          material: { color: "#56a0ff", roughness: 0.55, metalness: 0.15 }
        },
        {
          objType: "box",
          name: "floor",
          threeJsonId: "floor-1",
          position: { x: 0, y: -2, z: 0 },
          geometry: { width: 120, height: 2, depth: 120 },
          material: { color: "#3c4654", roughness: 0.9, metalness: 0.05 }
        }
      ]
    }
  };

  window.addEventListener("DOMContentLoaded", init);
  window.addEventListener("beforeunload", () => runtime?.dispose?.());

  btnDelete.addEventListener("click", () => {
    if (!runtime?.scene) return;
    const result = disposeByThreeJsonId(runtime.scene, "cube-main");
    status.textContent = result.ok ? "已删除：cube-main" : "删除失败：" + (result.error || "unknown");
  });

  btnDisposeRuntime.addEventListener("click", () => {
    runtime?.dispose?.();
    runtime = null;
    status.textContent = "runtime 已销毁";
  });

  async function init() {
    try {
      sceneJson.canvasWidth = window.innerWidth;
      sceneJson.canvasHeight = window.innerHeight;
      runtime = await createJsonScene(sceneJson, { canvas, resetScene: true, assetsBase: "/assets" });
      runtime.start();
      status.textContent = "场景已运行（即使不手动调用回收 API 也可正常运行）";
      window.addEventListener("resize", () => runtime?.resize?.(window.innerWidth, window.innerHeight));
    } catch (error) {
      console.error(error);
      status.textContent = "加载失败：" + error.message;
    }
  }
</script>
</body>
</html>

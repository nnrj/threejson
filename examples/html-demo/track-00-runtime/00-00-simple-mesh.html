<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ThreeJSON Tutorial · Track 0 · 最小场景（同步）</title>
  <link rel="icon" href="../../../assets/img/threejson.ico" type="image/x-icon">
  <script type="importmap">
    {
      "imports": {
        "threejson": "../../../builtins/full.js",
        "threejson/core": "../../../core/index.js",
        "three": "https://esm.sh/three@0.184.0",
        "three/examples/jsm/": "https://esm.sh/three@0.184.0/examples/jsm/",
        "@tweenjs/tween.js": "https://esm.sh/@tweenjs/tween.js@25.0.0",
        "html2canvas-pro": "https://esm.sh/html2canvas-pro@2.0.4",
        "gifuct-js": "https://esm.sh/gifuct-js@2.1.2",
        "three-mesh-bvh": "https://esm.sh/three-mesh-bvh@0.9.10?deps=three@0.184.0",
        "three-bvh-csg": "https://esm.sh/three-bvh-csg@0.0.18?deps=three@0.184.0,three-mesh-bvh@0.9.10"
      }
    }
  </script>
  <style>
    html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; background: #222; font-family: Arial, "Microsoft YaHei", sans-serif; }
    #rootContainer { position: relative; width: 100vw; height: 100vh; }
    #canvasContainer { display: block; width: 100%; height: 100%; background: #111; }
    #hint {
      position: absolute; left: 12px; bottom: 12px; z-index: 25; max-width: min(720px, 92vw);
      padding: 8px 10px; border-radius: 4px; background: rgba(10,10,10,0.55); color: #e0e0e0; font-size: 12px; line-height: 1.45;
    }
  </style>
</head>
<body>
<div id="rootContainer">
  <canvas id="canvasContainer">需要 WebGL</canvas>
  <div id="hint">【Track 0 · 最小场景（同步）】内置 JSON + <code>createJsonSceneSimple</code>。它是 <code>createJsonScene</code> 的简化版，只保证同步加载；需要完整加载流程时请看 <code>00-01-minimal-mesh.html</code>。</div>
</div>
<script type="module">
  import { createJsonSceneSimple } from "threejson/core";

  const canvas = document.getElementById("canvasContainer");
  let sceneRuntime;

  const sceneData = {
    version: "next",
    name: "tutorial-simple-mesh",
    sceneConfig: {
      scene: { background: "#222222" },
      camera: {
        fov: 60,
        near: 0.1,
        far: 250,
        position: { x: 24, y: 16, z: 28 }
      },
      renderer: { antialias: true, ratioRate: 1 },
      controls: {
        enableDamping: true,
        dampingFactor: 0.08,
        target: { x: 0, y: 3, z: 0 }
      },
      lights: [
        { type: "ambient", color: "#ffffff", intensity: 0.6 },
        { type: "directional", color: "#ffffff", intensity: 1.1, position: { x: 24, y: 36, z: 20 } }
      ],
      renderLoop: { autoResize: true, firstAutoResize: true }
    },
    worldInfo: {
      boxModelList: [
        {
          name: "simple-floor",
          objType: "floor",
          geometry: { width: 28, height: 0.6, depth: 22 },
          position: { x: 0, y: -0.3, z: 0 },
          material: { type: "standard", color: "#d7dce2", roughness: 0.8 }
        },
        {
          name: "simple-box",
          objType: "box",
          geometry: { width: 6, height: 6, depth: 6 },
          position: { x: 0, y: 3, z: 0 },
          material: { type: "standard", color: "#409eff", metalness: 0.1, roughness: 0.55 }
        }
      ]
    },
    threeJsonId: "00-00-simple-mesh"
  };

  function init() {
    sceneData.canvasWidth = window.innerWidth;
    sceneData.canvasHeight = window.innerHeight;
    sceneRuntime = createJsonSceneSimple(sceneData, {
      canvas,
      assetsBase: "../../../assets",
      resetScene: true
    });
    window.addEventListener("resize", onResize);
    sceneRuntime.start();
  }

  function onResize() {
    sceneRuntime?.resize?.(window.innerWidth, window.innerHeight);
  }

  window.addEventListener("DOMContentLoaded", init);
  window.addEventListener("beforeunload", () => {
    window.removeEventListener("resize", onResize);
    sceneRuntime?.dispose?.();
  });
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ThreeJSON Tutorial · Track 3 · animationGraph 状态机</title>
  <link rel="icon" href="../../../assets/img/threejson.ico" type="image/x-icon">
  <script type="importmap">
    {
      "imports": {
        "threejson": "../../../builtins/full.js",
        "threejson/core": "../../../core/index.js",
        "three": "https://esm.sh/three@0.184.0",
        "three/examples/jsm/": "https://esm.sh/three@0.184.0/examples/jsm/",
        "@tweenjs/tween.js": "https://esm.sh/@tweenjs/tween.js@25.0.0",
        "html2canvas-pro": "https://esm.sh/html2canvas-pro@2.0.4",
        "gifuct-js": "https://esm.sh/gifuct-js@2.1.2",
        "three-mesh-bvh": "https://esm.sh/three-mesh-bvh@0.9.10?deps=three@0.184.0",
        "three-bvh-csg": "https://esm.sh/three-bvh-csg@0.0.18?deps=three@0.184.0,three-mesh-bvh@0.9.10"
      }
    }
  </script>
  <style>
    html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; background: #222; font-family: Arial, "Microsoft YaHei", sans-serif; }
    #rootContainer { position: relative; width: 100vw; height: 100vh; }
    #canvasContainer { display: block; width: 100%; height: 100%; background: #111; }
    #loadingMask {
      position: absolute; inset: 0; z-index: 20; display: flex; align-items: center; justify-content: center;
      color: #fff; background: rgba(0,0,0,0.55); font-size: 15px;
    }
    #panel {
      position: absolute; right: 12px; top: 12px; z-index: 30; display: flex; flex-direction: column; gap: 8px;
      padding: 10px; border-radius: 6px; background: rgba(10,10,10,0.72); color: #e8eaed; font-size: 12px;
    }
    #panel button {
      cursor: pointer; border: 1px solid rgba(255,255,255,0.15); background: #2a3344; color: #fff;
      padding: 6px 10px; border-radius: 4px;
    }
    #panel button:hover { background: #36445a; }
  </style>
</head>
<body>
<div id="rootContainer">
  <canvas id="canvasContainer">需要 WebGL</canvas>
  <div id="loadingMask">加载中…</div>
  <div id="panel">
    <div>animationGraph 参数</div>
    <button id="btnFast" type="button">切换 fast</button>
    <button id="btnPulse" type="button">触发 pulse（单次 bobY）</button>
  </div>
</div>
<script type="module">
  import { createJsonScene, setAnimationParameter } from "threejson/core";

  const sceneJsonUrl = "../../../assets/json/tutorial/track-03/03-06-animation-graph.json";
  const canvas = document.getElementById("canvasContainer");
  const loadingMask = document.getElementById("loadingMask");
  let sceneRuntime;
  let fast = false;

  window.addEventListener("DOMContentLoaded", init);
  window.addEventListener("beforeunload", () => sceneRuntime?.dispose?.());

  async function init() {
    try {
      const response = await fetch(sceneJsonUrl);
      if (!response.ok) throw new Error("HTTP " + response.status);
      const sceneData = await response.json();
      sceneData.canvasWidth = window.innerWidth;
      sceneData.canvasHeight = window.innerHeight;
      sceneRuntime = await createJsonScene(sceneData, {
    canvas,
    assetsBase: "../../../assets",
    resetScene: true
  });
      window.addEventListener("resize", () => sceneRuntime?.resize?.(window.innerWidth, window.innerHeight));
      sceneRuntime.start();
      loadingMask.style.display = "none";
      bindControls();
    } catch (err) {
      console.error(err);
      loadingMask.textContent = "加载失败：" + err.message;
    }
  }

  function bindControls() {
    document.getElementById("btnFast").addEventListener("click", () => {
      fast = !fast;
      setAnimationParameter("graph-pyramid", "fast", fast);
      if (fast) {
        setAnimationParameter("graph-pyramid", "pulse", false);
      }
    });
    document.getElementById("btnPulse").addEventListener("click", () => {
      setAnimationParameter("graph-pyramid", "pulse", true);
      setAnimationParameter("graph-pyramid", "fast", false);
      fast = false;
      window.setTimeout(() => setAnimationParameter("graph-pyramid", "pulse", false), 50);
    });
  }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ThreeJSON Tutorial · Track 3 · glTF 含剪辑 + AnimationMixer</title>
  <link rel="icon" href="/assets/img/threejson.ico" type="image/x-icon">
  <script type="importmap">
    
    {
      "imports": {
        "threejson": "/builtins/full.js",
        "threejson/core": "/core/index.js",
        "three": "https://esm.sh/three@0.184.0",
        "three/examples/jsm/": "https://esm.sh/three@0.184.0/examples/jsm/",
        "@tweenjs/tween.js": "https://esm.sh/@tweenjs/tween.js@25.0.0",
        "html2canvas-pro": "https://esm.sh/html2canvas-pro@2.0.4",
        "gifuct-js": "https://esm.sh/gifuct-js@2.1.2",
        "three-mesh-bvh": "https://esm.sh/three-mesh-bvh@0.9.10?deps=three@0.184.0",
        "three-bvh-csg": "https://esm.sh/three-bvh-csg@0.0.18?deps=three@0.184.0,three-mesh-bvh@0.9.10"
      }
    }
  
  </script>
  <style>
    html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; background: #2f2f2f; font-family: Arial, "Microsoft YaHei", sans-serif; }
    #rootContainer { position: relative; width: 100vw; height: 100vh; background: #2f2f2f; }
    #canvasContainer { display: block; width: 100%; height: 100%; background: #222; outline: none; }
    #loadingMask {
      position: absolute; inset: 0; z-index: 20; display: flex; align-items: center; justify-content: center;
      color: #fff; background: rgba(47, 47, 47, 0.72); font-size: 15px; text-align: center; padding: 16px;
    }
    #hint {
      position: absolute; left: 12px; bottom: 12px; z-index: 25; max-width: min(720px, 92vw);
      padding: 8px 10px; border-radius: 4px; background: rgba(10, 10, 10, 0.55); color: #e0e0e0; font-size: 12px; line-height: 1.45;
    }
  </style>
</head>
<body>
<div id="rootContainer">
  <canvas id="canvasContainer">需要 WebGL</canvas>
  <div id="loadingMask">Track 3 · glTF 动画剪辑加载中…</div>
  <div id="hint">
    资源：<code>/assets/json/tutorial/track-03/03-02-gltf-animation-mixer.json</code>；glTF 含线性 <strong>translation</strong> 剪辑（约 1s 周期上下位移），加载后由 core 注册 <code>AnimationMixer</code>。
    可在 JSON 上改 <code>animationMode</code> 为 <code>mixer</code> / <code>basic</code> 观察与声明式 <code>animations</code> 的协调（本示例未配声明式 rotate）。
  </div>
</div>
<script type="module">
  import { createJsonScene } from "threejson";

  const canvasContainer = document.getElementById("canvasContainer");
  const loadingMask = document.getElementById("loadingMask");
  const sceneJsonUrl = "/assets/json/tutorial/track-03/03-02-gltf-animation-mixer.json";

  window.addEventListener("DOMContentLoaded", () => void initDemo());
  window.addEventListener("beforeunload", () => sceneRuntime?.dispose?.());

  let sceneRuntime;

  async function initDemo() {
    try {
      const response = await fetch(sceneJsonUrl);
      if (!response.ok) throw new Error(`HTTP ${response.status}`);
      const sceneData = await response.json();
      sceneData.canvasWidth = window.innerWidth;
      sceneData.canvasHeight = window.innerHeight;
      sceneRuntime = await createJsonScene(sceneData, { canvas: canvasContainer });
      window.addEventListener("resize", () =>
        sceneRuntime?.resize?.(window.innerWidth, window.innerHeight)
      );
      sceneRuntime.renderLoop.start();
      loadingMask.style.display = "none";
    } catch (e) {
      console.error(e);
      loadingMask.textContent = "加载失败：" + (e && e.message ? e.message : String(e));
    }
  }
</script>
</body>
</html>

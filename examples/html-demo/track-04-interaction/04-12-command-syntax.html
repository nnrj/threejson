<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ThreeJSON Tutorial · Track 4 · 命令语法</title>
  <link rel="icon" href="../../../assets/img/threejson.ico" type="image/x-icon">
  <script type="importmap">
    {
      "imports": {
        "threejson": "../../../builtins/full.js",
        "threejson/core": "../../../core/index.js",
        "three": "https://esm.sh/three@0.184.0",
        "three/examples/jsm/": "https://esm.sh/three@0.184.0/examples/jsm/",
        "@tweenjs/tween.js": "https://esm.sh/@tweenjs/tween.js@25.0.0",
        "html2canvas-pro": "https://esm.sh/html2canvas-pro@2.0.4",
        "gifuct-js": "https://esm.sh/gifuct-js@2.1.2",
        "three-mesh-bvh": "https://esm.sh/three-mesh-bvh@0.9.10?deps=three@0.184.0",
        "three-bvh-csg": "https://esm.sh/three-bvh-csg@0.0.18?deps=three@0.184.0,three-mesh-bvh@0.9.10"
      }
    }
  </script>
  <style>
    :root {
      color-scheme: dark;
      --bg: #1a1a1a;
      --panel-bg: rgba(22, 26, 34, 0.55);
      --panel-border: rgba(255, 255, 255, 0.08);
      --text-main: #f3f5f7;
      --text-muted: rgba(232, 234, 237, 0.72);
    }
    html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; background: var(--bg); font-family: Arial, "Microsoft YaHei", sans-serif; color: var(--text-main); }
    * { box-sizing: border-box; }
    button, textarea { font: inherit; }
    #rootContainer { position: relative; width: 100vw; height: 100vh; }
    #canvasContainer { display: block; width: 100%; height: 100%; background: #222; }
    #loadingMask {
      position: absolute; inset: 0; z-index: 20; display: flex; align-items: center; justify-content: center;
      color: #fff; background: rgba(0, 0, 0, 0.55); font-size: 15px;
    }
    .commandPanel {
      position: absolute; top: 18px; right: 18px; z-index: 25;
      width: min(360px, calc(100vw - 36px));
      max-height: calc(100vh - 36px);
      overflow: auto;
      padding: 14px;
      border: 1px solid var(--panel-border);
      border-radius: 10px;
      background: var(--panel-bg);
      box-shadow: 0 12px 28px rgba(0, 0, 0, 0.28);
      -webkit-backdrop-filter: blur(22px) saturate(1.15);
      backdrop-filter: blur(22px) saturate(1.15);
    }
    .commandPanel h2 { margin: 0 0 6px; font-size: 16px; }
    .commandPanel p { margin: 0 0 10px; color: var(--text-muted); font-size: 12px; line-height: 1.55; }
    .commandPanel code { color: #b8d4ff; font-size: 11px; }
    #commandScript {
      display: block; width: 100%; min-height: 140px; resize: vertical;
      padding: 8px 10px; border-radius: 6px; border: 1px solid rgba(255, 255, 255, 0.14);
      background: rgba(8, 12, 18, 0.72); color: #e8eaed; font: 12px/1.5 Consolas, "Courier New", monospace;
    }
    .commandPanel button {
      width: 100%; margin-top: 8px; padding: 8px 12px; border-radius: 6px;
      border: 1px solid rgba(64, 158, 255, 0.45); background: rgba(64, 158, 255, 0.2);
      color: var(--text-main); font-size: 13px; cursor: pointer;
    }
    .commandPanel button:hover { background: rgba(64, 158, 255, 0.32); }
    #commandLog {
      margin-top: 10px; padding: 8px 10px; border-radius: 6px;
      background: rgba(0, 0, 0, 0.35); font: 11px/1.5 Consolas, "Courier New", monospace;
      color: #d0d6df; max-height: 220px; overflow: auto; white-space: pre-wrap;
    }
  </style>
</head>
<body>
<div id="rootContainer">
  <canvas id="canvasContainer">需要 WebGL</canvas>
  <div id="loadingMask">加载中…</div>
  <aside class="commandPanel" aria-label="命令语法演示">
    <h2>命令语法演示</h2>
    <p>直接调用 core 的 <code>executeCommands(ctx, script)</code>，无需事件绑定；语法与编辑器【AI 调整】命令模式一致，每行一条命令。</p>
    <textarea id="commandScript" spellcheck="false">object.patch id=command-demo-box partial={"material":{"color":"#e6a23c"}}
object.patch id=command-demo-box partial={"position":{"y":3.5}}</textarea>
    <button type="button" id="runCommandsBtn">运行命令</button>
    <button type="button" id="resetCommandsBtn">复位</button>
    <div id="commandLog"></div>
  </aside>
</div>
<script type="module">
  import { createJsonScene, createCommandContext, executeCommands } from "threejson";

  const sceneJsonUrl = "../../../assets/json/tutorial/track-04/04-12-command-syntax.json";
  const canvas = document.getElementById("canvasContainer");
  const loadingMask = document.getElementById("loadingMask");
  const commandScript = document.getElementById("commandScript");
  const commandLog = document.getElementById("commandLog");
  const runCommandsBtn = document.getElementById("runCommandsBtn");
  const resetCommandsBtn = document.getElementById("resetCommandsBtn");

  let sceneRuntime;
  let ctx;

  window.addEventListener("DOMContentLoaded", init);
  window.addEventListener("beforeunload", () => sceneRuntime?.dispose?.());

  function buildCtx() {
    ctx = createCommandContext({
      scene: sceneRuntime?.scene ?? null,
      camera: sceneRuntime?.camera ?? null,
      renderer: sceneRuntime?.renderer ?? null,
      controls: sceneRuntime?.controls ?? null
    });
  }

  async function runScript() {
    buildCtx();
    const result = await executeCommands(ctx, commandScript.value, { executeMode: "runtime" });
    commandLog.textContent = JSON.stringify(result, null, 2);
  }

  async function resetScript() {
    buildCtx();
    await executeCommands(ctx, [
      { op: "object.patch", args: { id: "command-demo-box", partial: { position: { y: 1.5 }, material: { color: "#409eff" } } } }
    ], { executeMode: "runtime" });
    commandLog.textContent = "已复位";
  }

  async function init() {
    try {
      const response = await fetch(sceneJsonUrl);
      if (!response.ok) throw new Error("HTTP " + response.status);
      const sceneData = await response.json();
      sceneData.canvasWidth = window.innerWidth;
      sceneData.canvasHeight = window.innerHeight;
      sceneRuntime = await createJsonScene(sceneData, {
        canvas,
        assetsBase: "../../../assets",
        resetScene: true
      });
      window.addEventListener("resize", () => sceneRuntime?.resize?.(window.innerWidth, window.innerHeight));
      sceneRuntime.start();
      loadingMask.style.display = "none";
      runCommandsBtn.addEventListener("click", () => { void runScript(); });
      resetCommandsBtn.addEventListener("click", () => { void resetScript(); });
    } catch (err) {
      console.error(err);
      loadingMask.textContent = "加载失败：" + err.message;
    }
  }
</script>
</body>
</html>
